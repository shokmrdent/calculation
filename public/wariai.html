<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>速さ・割合 | うちトレ</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .simple-page-title,.story-page-title{font-size:15px;font-weight:800;color:#334155;text-align:center;padding:4px 0 3px;border-bottom:2px solid #6366f1;margin-bottom:4px;}
    .simple-prob-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(10,1fr);height:calc(297mm - 10mm - 22mm);}
    .simple-prob-item{display:flex;align-items:center;gap:6px;padding:0 10px;border-bottom:1px solid #e5e7eb;}
    .simple-prob-num{font-size:12px;color:#475569;min-width:24px;flex-shrink:0;}
    .simple-prob-expr{display:flex;align-items:center;gap:4px;flex:1;}
    .simple-prob-q{font-size:14px;font-weight:600;flex-shrink:0;}
    .simple-prob-blank{flex:1;border-bottom:1.5px solid #000;min-width:60px;height:20px;margin-left:6px;}
    .hayasa-hint{font-size:10px;color:#94a3b8;margin-top:2px;}
    .story-grid{display:grid;height:calc(297mm - 10mm - 22mm);}
    .story-page-title{border-bottom-color:#f97316;}
  </style>
</head>
<body data-page-type="wariai">
  <div class="container">
    <!-- ロゴ：中央配置 -->
    <div class="page-logo-area no-print">
      <img src="logo.svg" alt="うちトレ">
      <div>
        <div class="logo-text">うちトレ</div>
        <div class="logo-sub">Uchitore</div>
      </div>
    </div>

    <div class="header-row no-print">
      <div>
        <div style="display:none;"></div>
        <h1>割合・百分率</h1>
      </div>
      <div class="header-actions"><a href="top-home.html" class="secondary-button">トップへ戻る</a></div>
    </div>
    <div class="card controls no-print">
      <input type="hidden" id="mode" value="wariai">
      <div class="control-group">
        <label for="count">枚数</label>
        <select id="count"><option value="1">1</option><option value="5">5</option><option value="10" selected>10</option><option value="20">20</option></select>
      </div>
      <div class="page-actions">
        <button class="primary" onclick="generate()">生成</button>
        <button class="secondary" onclick="window.print()">印刷</button>
        <button class="secondary" onclick="downloadPDF()">PDF保存</button>
      </div>
    </div>
    <div id="pages"></div>
  </div>
  <script src="assets/hayasa-generator.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.2.0/dist/signature_pad.umd.min.js"></script>
  <script src="assets/tablet-v2.js?v=28"></script>
</body>
</html>
