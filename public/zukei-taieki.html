<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>図形の面積・体積 | うちトレ</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .zukei-page { width:100%;height:100%;display:flex;flex-direction:column;padding:6mm 8mm;box-sizing:border-box; }
    .zukei-page-title { font-size:15px;font-weight:800;color:#334155;text-align:center;padding-bottom:4px;border-bottom:2.5px solid #6366f1;margin-bottom:6px; }
    .zukei-grid { flex:1;display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);gap:12px; }
    .zukei-item { display:flex;flex-direction:column;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;background:#f8fafc;overflow:visible; }
    .zukei-header { display:flex;align-items:baseline;gap:6px;margin-bottom:2px; }
    .zukei-num { font-size:13px;color:#64748b;font-weight:700;flex-shrink:0; }
    .zukei-q { font-size:14px;font-weight:700;color:#1e293b; }
    .zukei-formula-hint { font-size:11px;color:#94a3b8;margin-bottom:6px; }
    .zukei-shape { flex:1;display:flex;align-items:center;justify-content:center;min-height:140px;overflow:visible; }
    .zukei-ans-row { display:flex;align-items:center;gap:6px;width:100%;margin-top:8px; }
    .zukei-ans-label { font-size:12px;color:#64748b;white-space:nowrap;min-width:28px;font-weight:600; }
    .zukei-blank-long { flex:1;border-bottom:1.5px solid #000;height:20px;display:inline-block; }
  </style>
</head>
<body data-page-type="taieki">
  <div class="container">
    <div class="page-logo-area no-print">
      <img src="logo.svg" alt="うちトレ">
      <div>
        <div class="logo-text">うちトレ</div>
        <div class="logo-sub">Uchitore</div>
      </div>
    </div>
    <div class="header-row no-print">
      <div>
        <h1>体積（直方体・立方体）</h1>
      </div>
      <div class="header-actions"><a href="top-home.html" class="secondary-button">トップへ戻る</a></div>
    </div>
    <div class="card controls no-print">
      <input type="hidden" id="mode" value="taieki">
      <div class="control-group">
        <label for="count">枚数</label>
        <select id="count">
          <option value="1">1</option><option value="5">5</option>
          <option value="10" selected>10</option><option value="20">20</option>
        </select>
      </div>
      <div class="page-actions">
        <button class="primary" onclick="generate()">生成</button>
        <button class="secondary" onclick="window.print()">印刷</button>
        <button class="secondary" onclick="downloadPDF()">PDF保存</button>
      </div>
    </div>
    <div id="pages"></div>
  </div>
  <script src="assets/zukei-generator.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.2.0/dist/signature_pad.umd.min.js"></script>
  <script src="assets/tablet-v2.js?v=31"></script>
</body>
</html>
