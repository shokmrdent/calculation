<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>うちトレ 8-Agent 開発ツール</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #020a18 0%, #070e1a 60%, #030810 100%);
      min-height: 100vh;
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      color: #e2e8f0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
    textarea:focus { outline: none; }
    button:active { transform: scale(0.97); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
  const { useState } = React;

  const AGENTS = [
    { id: "dev", name: "開発 Agent", icon: "🛠️", color: "#6366f1", tag: "未開発部分の実装",
      role: `あなたは「うちトレ」という計算学習Webアプリの開発者です。\n\n【アプリ概要】\n- 子供向け計算練習Webアプリ（保護者も対象）\n- 家庭学習モード：四則演算、分数、小数、関数（小1〜中3）\n- 中学受験モード：特殊算26ジャンル各100問\n- タブレット最適化・手書き対応（Canvas）・重複なしランダム出題\n\n【開発済み】四則演算・分数・小数の基本・旅人算・つるかめ算\n【未開発】ログイン認証・月額課金・保護者ダッシュボード・英語コンテンツ・特殊算残りジャンル\n\nユーザーの要件に対して、未開発部分の実装コード・設計を日本語コメント付きで提案してください。\nHTML/CSS/JavaScriptで実際に使えるコードを出してください。` },
    { id: "test", name: "テスト Agent", icon: "🧪", color: "#10b981", tag: "開発済み機能のテスト設計",
      role: `あなたは「うちトレ」という計算学習Webアプリのテスト担当者です。\n\n【開発済み機能（テスト対象）】\n- 四則演算の問題生成・正誤判定\n- 分数・小数の問題表示\n- Canvas手書き入力\n- 重複なしランダム出題ロジック\n- PC/タブレット切り替えレイアウト\n\nユーザーの要件に対して、以下を日本語で提案してください：\n- テストケース一覧（正常系・異常系・エッジケース）\n- 手動テスト手順\n- 自動テストのサンプルコード（JavaScript/Jest）\n- よくあるバグのチェックポイント` },
    { id: "juniorhigh", name: "中学数学 Agent", icon: "📐", color: "#a855f7", tag: "一次関数以降の全中学数学",
      role: `あなたは「うちトレ」アプリの中学数学実装専門家です。\n\n中学校の一次関数以降の全単元を、小学生の算数と同じ品質で実装する。\n実装対象：一次関数・連立方程式・二次方程式・二次関数・図形・確率統計・空間図形\n\nユーザーの要件に対して、具体的な実装方針・コード・問題生成ロジックを日本語で提案してください。` },
    { id: "english", name: "英語学習 Agent", icon: "🔤", color: "#f59e0b", tag: "英語ページ開発・実装",
      role: `あなたは「うちトレ」アプリの英語学習ページ開発専門家です。\n\nアルファベットの読み書きから英作文まで段階的に実装する。Canvas手書き・Web Speech API活用。\n\nユーザーの要件に対して、具体的な実装方針・HTML/CSS/JSコードを日本語で提案してください。` },
    { id: "multilang", name: "多言語 Agent", icon: "🌏", color: "#ef4444", tag: "英語・韓国語・中国語版",
      role: `あなたは「うちトレ」アプリの多言語対応専門家です。\n\n日本語版を英語・韓国語・中国語で完全再現する。i18n実装・翻訳JSON構造・フォント切り替えを提案。\n\nユーザーの要件に対して、具体的な翻訳内容・実装方針・JSONデータ構造・コードを提案してください。` },
    { id: "web", name: "HP作成 Agent", icon: "🌐", color: "#0ea5e9", tag: "訴求用ランディングページ",
      role: `あなたは「うちトレ」の訴求用LPのコピーライター兼デザイナーです。\n\nターゲット：小学生〜中学生の保護者。保護者の「子供の成績を上げたい」感情に訴えかけるコピーを作ってください。\n\nユーザーの要件に対して、LPのコピー文・セクション見出し・CTAボタン文言・HTMLコードを日本語で出力してください。` },
    { id: "instagram", name: "インスタ Agent", icon: "📸", color: "#e1306c", tag: "Instagram訴求コンテンツ",
      role: `あなたは「うちトレ」のインスタグラムマーケターです。\n\nユーザーの要件に対して、投稿テキスト・ハッシュタグ一覧・画像構成案・ストーリーズアイデア・最適投稿時間を日本語で出力してください。「ママが保存・シェアしたくなる」投稿を作ってください。` },
    { id: "twitter", name: "X Agent", icon: "🐦", color: "#1d9bf0", tag: "X（Twitter）訴求コンテンツ",
      role: `あなたは「うちトレ」のX（Twitter）マーケターです。\n\nユーザーの要件に対して、ツイート文案（3〜5パターン）・スレッド構成案・ハッシュタグ・発信戦略・インフルエンサーDM文案を日本語で出力してください。` },
  ];

  async function callAgent(agent, userTask, apiKey) {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: agent.role,
        messages: [{ role: "user", content: userTask }],
      }),
    });
    const data = await response.json();
    if(data.error) return "❌ エラー: " + data.error.message;
    return data.content?.map((b) => b.text || "").join("\n") || "エラーが発生しました";
  }

  function AgentCard({ agent, status, result, isSelected, onClick }) {
    const isRunning = status === "running";
    const isDone = status === "done";
    return (
      <div onClick={isDone ? onClick : undefined} style={{
        background: isSelected ? `${agent.color}15` : isDone ? "#0b1120" : "#060d18",
        border: `1.5px solid ${isRunning || isSelected ? agent.color : isDone ? `${agent.color}55` : "#1a2a3f"}`,
        borderRadius: 10, padding: "12px 14px",
        cursor: isDone ? "pointer" : "default",
        transition: "all 0.3s",
        boxShadow: isRunning ? `0 0 14px ${agent.color}45` : "none",
        flex: "1 1 calc(50% - 6px)", minWidth: 140,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 18 }}>{agent.icon}</span>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ color: agent.color, fontWeight: 700, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{agent.name}</div>
            <div style={{ color: "#4b5563", fontSize: 10, marginTop: 2 }}>{agent.tag}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 4, flexShrink: 0 }}>
            {isRunning && <span style={{ width: 7, height: 7, borderRadius: "50%", background: agent.color, display: "inline-block", animation: "blink 0.8s infinite" }} />}
            <span style={{ fontSize: 10, color: isRunning ? agent.color : isDone ? "#4b5563" : "#1f2937" }}>
              {isRunning ? "実行中" : isDone ? "完了✅" : "待機"}
            </span>
          </div>
        </div>
        {isDone && !isSelected && <div style={{ color: "#374151", fontSize: 10, marginTop: 6 }}>👆 タップして結果を見る</div>}
      </div>
    );
  }

  function App() {
    const [task, setTask] = useState("");
    const [agentStates, setAgentStates] = useState(Object.fromEntries(AGENTS.map((a) => [a.id, { status: "idle", result: null }])));
    const [running, setRunning] = useState(false);
    const [elapsed, setElapsed] = useState(null);
    const [selected, setSelected] = useState(null);
    const [doneCount, setDoneCount] = useState(0);
    const [selectedAgents, setSelectedAgents] = useState(AGENTS.map((a) => a.id));

    const updateAgent = (id, update) => setAgentStates((prev) => ({ ...prev, [id]: { ...prev[id], ...update } }));

    const toggleAgent = (id) => {
      if (running) return;
      setSelectedAgents((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]);
    };

    const runAll = async () => {
      if (!task.trim() || running || selectedAgents.length === 0) return;
      const apiKey = document.getElementById('apiKeyInput').value.trim();
      if (!apiKey) { alert('APIキーを入力してください'); return; }
      setRunning(true); setElapsed(null); setSelected(null); setDoneCount(0);
      const start = Date.now();
      const targets = AGENTS.filter((a) => selectedAgents.includes(a.id));
      targets.forEach((a) => updateAgent(a.id, { status: "running", result: null }));
      AGENTS.filter((a) => !selectedAgents.includes(a.id)).forEach((a) => updateAgent(a.id, { status: "idle", result: null }));
      const timer = setInterval(() => setElapsed(((Date.now() - start) / 1000).toFixed(1)), 100);
      let count = 0;
      await Promise.all(targets.map(async (agent) => {
        try {
          const result = await callAgent(agent, task, apiKey);
          updateAgent(agent.id, { status: "done", result });
        } catch(e) {
          updateAgent(agent.id, { status: "error", result: "エラー: " + e.message });
        }
        count++;
        setDoneCount(count);
      }));
      clearInterval(timer);
      setElapsed(((Date.now() - start) / 1000).toFixed(1));
      setRunning(false);
    };

    const reset = () => {
      setTask(""); setElapsed(null); setSelected(null); setDoneCount(0);
      AGENTS.forEach((a) => updateAgent(a.id, { status: "idle", result: null }));
    };

    const examples = [
      "一次関数の問題生成ロジックを実装したい",
      "アルファベットの手書き練習ページを作りたい",
      "英語・韓国語・中国語のi18n対応をしたい",
      "インスタとXで英語学習機能を訴求したい",
      "中学数学のテストモードを設計したい",
      "保護者ダッシュボードを実装したい",
    ];

    const selectedAgent = selected ? AGENTS.find((a) => a.id === selected) : null;
    const selectedResult = selected ? agentStates[selected]?.result : null;
    const totalSelected = selectedAgents.length;

    return (
      <div style={{ maxWidth: 720, margin: "0 auto", padding: "24px 16px" }}>

        {/* ヘッダー */}
        <div style={{ textAlign: "center", marginBottom: 20 }}>
          <div style={{ fontSize: 10, color: "#f59e0b", letterSpacing: 4, marginBottom: 4 }}>UCHITORE — MULTI AGENT v2</div>
          <h1 style={{ fontSize: 22, fontWeight: 800, margin: 0 }}>🧮 うちトレ 8-Agent 開発ツール</h1>
          <p style={{ color: "#4b5563", fontSize: 11, marginTop: 6 }}>使いたいAgentを選んで同時実行できます</p>
        </div>

        {/* APIキー入力 */}
        <div style={{ background: "#09121f", border: "1.5px solid #1e3a5f", borderRadius: 12, padding: "12px 14px", marginBottom: 16 }}>
          <label style={{ fontSize: 11, color: "#f59e0b", display: "block", marginBottom: 6, fontWeight: 700 }}>
            🔑 Anthropic APIキー（必須）
          </label>
          <input
            id="apiKeyInput"
            type="password"
            placeholder="sk-ant-api03-..."
            style={{
              width: "100%", background: "#020c1b", border: "1.5px solid #1e3a5f",
              borderRadius: 8, padding: "8px 12px", color: "#e2e8f0",
              fontSize: 13, boxSizing: "border-box",
            }}
          />
          <div style={{ fontSize: 10, color: "#374151", marginTop: 5 }}>
            ※ キーはこのページ内だけで使用されます。サーバーには送信されません。
          </div>
        </div>

        {/* Agent セレクター */}
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: "#4b5563", marginBottom: 8 }}>▼ 実行するAgentを選択（{totalSelected}/{AGENTS.length}）</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {AGENTS.map((a) => {
              const on = selectedAgents.includes(a.id);
              return (
                <button key={a.id} onClick={() => toggleAgent(a.id)} style={{
                  background: on ? `${a.color}20` : "#060d18",
                  border: `1.5px solid ${on ? a.color : "#1a2a3f"}`,
                  borderRadius: 20, padding: "4px 12px",
                  color: on ? a.color : "#374151",
                  fontSize: 11, fontWeight: on ? 700 : 400, cursor: "pointer", transition: "all 0.2s",
                }}>
                  {a.icon} {a.name.replace(" Agent", "")}
                </button>
              );
            })}
          </div>
        </div>

        {/* 入力エリア */}
        <div style={{ background: "#09121f", border: "1.5px solid #152030", borderRadius: 14, padding: 16, marginBottom: 12 }}>
          <label style={{ fontSize: 11, color: "#4b5563", display: "block", marginBottom: 8 }}>
            ▼ やりたいこと・作りたい機能を入力してください
          </label>
          <textarea
            value={task}
            onChange={(e) => setTask(e.target.value)}
            placeholder="例: アルファベットの手書き練習ページを作りたい"
            rows={4}
            style={{
              width: "100%", background: "#020c1b", border: "1.5px solid #1e3a5f",
              borderRadius: 10, padding: "10px 12px", color: "#e2e8f0",
              fontSize: 14, resize: "vertical", lineHeight: 1.7,
            }}
          />
          {/* 例文ボタン */}
          <div style={{ marginTop: 8 }}>
            <div style={{ fontSize: 10, color: "#374151", marginBottom: 5 }}>例文：</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
              {examples.map((ex, i) => (
                <button key={i} onClick={() => setTask(ex)} style={{
                  background: "#060d18", border: "1px solid #1e3a5f", borderRadius: 20,
                  padding: "3px 10px", color: "#4b5563", fontSize: 10, cursor: "pointer",
                }}>
                  {ex.slice(0, 18)}{ex.length > 18 ? "…" : ""}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* 実行ボタン */}
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          <button onClick={runAll} disabled={running || !task.trim() || totalSelected === 0}
            style={{
              flex: 1, padding: "13px 0",
              background: running || !task.trim() || totalSelected === 0
                ? "#111827" : "linear-gradient(135deg, #6366f1, #a855f7)",
              border: "none", borderRadius: 12,
              color: running || !task.trim() || totalSelected === 0 ? "#374151" : "#fff",
              fontSize: 15, fontWeight: 800,
              cursor: running || !task.trim() || totalSelected === 0 ? "not-allowed" : "pointer",
              transition: "all 0.2s",
            }}>
            {running
              ? `⚡ 実行中... ${doneCount}/${totalSelected} 完了  ${elapsed}s`
              : `⚡ ${totalSelected} Agents 同時実行`}
          </button>
          <button onClick={reset} style={{
            padding: "13px 16px", background: "#09121f",
            border: "1.5px solid #152030", borderRadius: 12, color: "#4b5563", fontSize: 12, cursor: "pointer",
          }}>リセット</button>
        </div>

        {/* 完了メッセージ */}
        {!running && elapsed && doneCount === totalSelected && (
          <div style={{ textAlign: "center", marginBottom: 12, color: "#10b981", fontSize: 12, fontWeight: 700 }}>
            ✅ {totalSelected} Agents 完了！ — {elapsed}秒で並列処理しました
          </div>
        )}

        {/* Agent カード */}
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
          {AGENTS.filter((a) => selectedAgents.includes(a.id)).map((agent) => (
            <AgentCard
              key={agent.id} agent={agent}
              status={agentStates[agent.id].status}
              result={agentStates[agent.id].result}
              isSelected={selected === agent.id}
              onClick={() => setSelected(selected === agent.id ? null : agent.id)}
            />
          ))}
        </div>

        {/* 結果表示 */}
        {selectedAgent && selectedResult && (
          <div style={{
            background: "#09121f", border: `2px solid ${selectedAgent.color}70`,
            borderRadius: 14, padding: 16,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
              <span style={{ fontSize: 18 }}>{selectedAgent.icon}</span>
              <span style={{ color: selectedAgent.color, fontWeight: 700, fontSize: 14 }}>
                {selectedAgent.name} の回答
              </span>
              <button onClick={() => setSelected(null)} style={{
                marginLeft: "auto", background: "#152030", border: "none",
                color: "#9ca3af", fontSize: 14, cursor: "pointer",
                borderRadius: 6, padding: "2px 8px",
              }}>✕ 閉じる</button>
            </div>
            <div style={{
              color: "#cbd5e1", fontSize: 13, lineHeight: 1.9,
              whiteSpace: "pre-wrap", maxHeight: 500, overflowY: "auto",
              background: "#020c1b", borderRadius: 10, padding: 14,
            }}>
              {selectedResult}
            </div>
          </div>
        )}

        <div style={{ textAlign: "center", marginTop: 20, color: "#1f2937", fontSize: 10 }}>
          うちトレ Multi-Agent v2 · 8 Agents Parallel · claude-sonnet-4-6
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
