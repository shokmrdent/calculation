<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>とけいのもんだい | うちトレ</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .tokei-page{width:100%;height:100%;display:flex;flex-direction:column;padding:8mm 10mm;box-sizing:border-box;}
    .tokei-page-title{font-size:16px;font-weight:800;color:#334155;text-align:center;padding-bottom:5px;border-bottom:2.5px solid #f97316;margin-bottom:8px;}
    .tokei-grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:8px;}
    .tokei-item{display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:6px 4px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fffbf5;}
    .tokei-num{font-size:12px;color:#64748b;align-self:flex-start;font-weight:700;}
    .tokei-clock{line-height:0;}
    .tokei-question{font-size:12px;font-weight:700;color:#334155;text-align:center;margin:3px 0;}
    .tokei-ans-row{display:flex;align-items:center;gap:4px;width:100%;}
    .tokei-ans-label{font-size:11px;color:#64748b;white-space:nowrap;}
    .tokei-blank-long{flex:1;border-bottom:1.5px solid #000;height:18px;display:inline-block;}
  </style>
</head>
<body data-page-type="tokei-calc">
  <div class="container">
    <!-- ロゴ：中央配置 -->
    <div class="page-logo-area no-print">
      <img src="logo.svg" alt="うちトレ">
      <div>
        <div class="logo-text">うちトレ</div>
        <div class="logo-sub">Uchitore</div>
      </div>
    </div>

    <div class="header-row no-print">
      <div>
        <div style="display:none;"></div>
        <h1>じこくのけいさん（○ふんご・まえ）</h1>
        <div class="small-note">アナログとけいをよむれんしゅうと、じこくのけいさん。</div>
      </div>
      <div class="header-actions"><a href="top-home.html" class="secondary-button">トップへ戻る</a></div>
    </div>
    <div class="card controls no-print">
      <input type="hidden" id="op" value="calc">
      <div class="control-group">
        <label for="level">レベル</label>
        <select id="level">
          <option value="easy" selected>かんたん（5ふんきざみ）</option>
          <option value="normal">ふつう（5分きざみ）</option>
        </select>
      </div>
      <div class="control-group">
        <label for="count">枚数</label>
        <select id="count">
          <option value="1">1</option><option value="5">5</option>
          <option value="10" selected>10</option><option value="20">20</option>
        </select>
      </div>
      <div class="page-actions">
        <button class="primary" onclick="generate()">生成</button>
        <button class="secondary" onclick="window.print()">印刷</button>
        <button class="secondary" onclick="downloadPDF()">PDF保存</button>
      </div>
    </div>
    <div id="pages"></div>
  </div>
  <script src="assets/tokei-generator.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.2.0/dist/signature_pad.umd.min.js"></script>
  <script src="assets/tablet-v2.js?v=28"></script>
<!-- ログインガード -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/assets/firebase-config.js"></script>
<script src="/assets/auth.js"></script>
<script>requireAuth();</script>
</body>
</html>
