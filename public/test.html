<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>テスト | うちトレ</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--orange:#f97316;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--bg:#fffdf7;--text:#1c1917;--muted:#78716c;}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans JP',sans-serif;background:var(--bg);}

/* ===================== スタート画面 ===================== */
#startScreen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;text-align:center;padding:32px;z-index:1000;
}
.start-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:28px;color:var(--orange);}
.start-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:36px;color:var(--text);}
.start-unit{font-size:15px;color:var(--muted);margin-top:-8px;}
.start-rules{
  background:#fff;border-radius:20px;padding:24px 28px;
  box-shadow:0 4px 24px rgba(0,0,0,.08);
  max-width:400px;width:100%;text-align:left;
}
.start-rules h3{font-size:15px;font-weight:900;margin-bottom:12px;color:var(--text);}
.start-rules li{font-size:14px;color:var(--muted);line-height:2;list-style:none;padding-left:4px;}
.start-rules li::before{content:'✅ ';margin-right:4px;}
.start-btn{
  padding:18px 48px;border-radius:20px;border:none;
  background:var(--orange);color:#fff;
  font:inherit;font-size:18px;font-weight:900;
  cursor:pointer;
  box-shadow:0 6px 24px rgba(249,115,22,.4);
  transition:.15s;
}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(249,115,22,.5);}

/* ===================== テスト画面 ===================== */
#testScreen{display:none;flex-direction:column;height:100%;}

/* ツールバー（tablet-v2と同じスタイル） */
#tb-bar{
  background:#1e293b;box-shadow:0 2px 10px rgba(0,0,0,.4);flex-shrink:0;
}
.tb-row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 12px;}
.tb-row2{display:flex;align-items:center;gap:10px;padding:6px 12px;background:#0f172a;border-top:1px solid #334155;}
.tbb{background:#475569;color:#fff;border:none;border-radius:7px;padding:6px 11px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;transition:.12s;}
.tbb:hover{opacity:.85;}
.tbb.pen    {background:#1d4ed8;}
.tbb.eraser {background:#64748b;}
.tbb.clear  {background:#7f1d1d;}
.tbb.cfg    {background:#334155;}
.tbb.active-pen    {background:#2563eb;outline:2px solid #fff;outline-offset:1px;}
.tbb.active-eraser {background:#94a3b8;outline:2px solid #fff;outline-offset:1px;}
.color-btn{width:26px;height:26px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;}
.tb-divider{width:1px;height:28px;background:#475569;flex-shrink:0;}

/* タイマー・進捗 */
.tb-status{color:#94a3b8;font-size:13px;margin-left:auto;display:flex;align-items:center;gap:16px;flex-shrink:0;}
.tb-timer{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:#f97316;}
.tb-progress-q{font-size:13px;color:#94a3b8;}
.tb-score{font-size:13px;color:#22c55e;font-weight:700;}

/* 設定パネル */
#tb-cfg-panel{display:none;padding:4px 14px 8px;gap:16px;align-items:center;flex-wrap:wrap;background:#1e293b;}
#tb-cfg-panel label{color:#94a3b8;font-size:13px;display:flex;align-items:center;gap:6px;}

/* ===================== メインエリア ===================== */
#mainArea{display:flex;flex:1;overflow:hidden;position:relative;}

/* 描画キャンバス */
#canvasWrap{flex:1;position:relative;background:#fff;overflow:hidden;}
#drawCanvas{position:absolute;inset:0;touch-action:none;}

/* 問題オーバーレイ */
#qOverlay{
  position:absolute;top:12px;left:12px;
  background:rgba(255,255,255,.9);backdrop-filter:blur(8px);
  border:2px solid #e7e5e4;border-radius:16px;
  padding:10px 18px;pointer-events:none;z-index:5;
}
.q-num{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.q-text{font-family:'Nunito',sans-serif;font-size:clamp(26px,4.5vw,52px);font-weight:900;color:var(--text);line-height:1.1;}
.q-text .qop{color:var(--orange);}

/* サイドパネル（解答） */
#sidePanel{
  width:200px;flex-shrink:0;
  display:flex;flex-direction:column;
  padding:10px;gap:8px;
  background:var(--bg);border-left:2px solid #e7e5e4;
  overflow-y:auto;
}
.side-label{font-size:11px;font-weight:700;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:.5px;}
#ansDisp{
  height:52px;background:#f5f5f4;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Nunito',sans-serif;font-size:32px;font-weight:900;color:var(--text);
  border:2px solid transparent;transition:.2s;position:relative;
}
#ansDisp.has-input{border-color:var(--orange);}
#ansDisp.correct  {background:#dcfce7;border-color:var(--green);color:var(--green);}
#ansDisp.wrong    {background:#fee2e2;border-color:var(--red);  color:var(--red);}
.ans-ph{color:#d4d0cc;font-size:22px;}
#correctHint{font-size:11px;font-weight:700;color:var(--red);text-align:center;display:none;}
#feedback{font-size:28px;text-align:center;min-height:36px;}

/* テンキー */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.nk{
  aspect-ratio:1;background:#fff;border:1.5px solid #e7e5e4;border-radius:10px;
  font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;color:var(--text);
  cursor:pointer;transition:.12s;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.nk:active{transform:scale(.92);background:#f5f5f4;}
.nk.del  {background:#fef2e8;border-color:#fed7aa;color:var(--orange);font-size:13px;}
.nk.dot  {font-size:14px;}
.nk.enter{background:var(--orange);border-color:var(--orange);color:#fff;font-size:12px;line-height:1.3;}
.nk.enter:active{background:#ea6c0a;}
.nk:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ===================== 結果画面 ===================== */
#resultOverlay{
  position:fixed;inset:0;background:rgba(255,253,247,.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;text-align:center;padding:24px;z-index:200;
}
#resultOverlay.show{display:flex;}
.r-icon {font-size:64px;}
.r-title{font-family:'Nunito',sans-serif;font-size:32px;font-weight:900;}
.r-score{font-family:'Nunito',sans-serif;font-size:48px;font-weight:900;color:var(--orange);}
.r-score span{font-size:16px;color:var(--muted);}
.r-stats{
  background:#fff;border-radius:16px;padding:16px 24px;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
  display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;
  text-align:left;font-size:13px;
}
.r-stats .lbl{color:var(--muted);font-weight:700;}
.r-stats .val{font-weight:900;color:var(--text);}
.r-sub{font-size:13px;color:var(--muted);line-height:1.7;max-width:360px;}
.r-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.rb{padding:12px 24px;border-radius:12px;border:none;font:inherit;font-size:14px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block;}
.rb.primary  {background:var(--orange);color:#fff;box-shadow:0 4px 14px rgba(249,115,22,.3);}
.rb.secondary{background:#fff;color:var(--text);border:2px solid #e7e5e4;}

/* 消しゴムカーソル */
#eraserCursor{position:fixed;pointer-events:none;z-index:99999;border-radius:50%;border:2.5px solid #ef4444;background:rgba(239,68,68,.1);display:none;transform:translate(-50%,-50%);}

@keyframes pop  {0%{transform:scale(.8);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.pop  {animation:pop   .3s ease;}
.shake{animation:shake .3s ease;}
</style>
</head>
<body>

<!-- ── スタート画面 ── -->
<div id="startScreen">
  <div class="start-logo">うちトレ</div>
  <div class="start-title" id="startTitle">テスト</div>
  <div class="start-unit"  id="startUnit">読み込み中...</div>
  <div class="start-rules">
    <h3>📋 テストのルール</h3>
    <ul>
      <li>全部で 10問 出題されます</li>
      <li>ペンで計算して、テンキーで答えを入力</li>
      <li>10問全問正解で合格🎉</li>
      <li>タイマーで解答時間を計測します</li>
    </ul>
  </div>
  <button class="start-btn" id="startBtn">🚀 テスト開始</button>
</div>

<!-- ── テスト画面 ── -->
<div id="testScreen">

  <!-- ツールバー -->
  <div id="tb-bar">
    <div class="tb-row1">
      <button class="tbb pen active-pen" id="tbbPen"    onclick="setTool('pen')">🖊 ペン</button>
      <button class="tbb eraser"         id="tbbEraser" onclick="setTool('eraser')">🧹 消しゴム</button>
      <div style="display:flex;gap:5px" id="colorBtns">
        <button class="color-btn" data-c="#000000" style="background:#000000;outline:3px solid #fff;outline-offset:2px"></button>
        <button class="color-btn" data-c="#1d4ed8" style="background:#1d4ed8"></button>
        <button class="color-btn" data-c="#dc2626" style="background:#dc2626"></button>
        <button class="color-btn" data-c="#16a34a" style="background:#16a34a"></button>
      </div>
      <div class="tb-divider"></div>
      <button class="tbb clear" onclick="clearCanvas()">🗑 全消し</button>
      <button class="tbb cfg"   onclick="toggleSettings()">⚙️ 設定</button>
      <div class="tb-status">
        <span class="tb-score"   id="tbScore">✅ 0問正解</span>
        <span class="tb-progress-q" id="tbQ">問題 1/10</span>
        <span class="tb-timer"   id="tbTimer">00:00</span>
      </div>
    </div>
    <div id="tb-cfg-panel">
      <label>ペンの太さ <input type="range" id="penSizeSlider" min="1" max="16" value="5"> <span id="penSizeVal" style="color:#fff">5</span></label>
      <label>消しゴム   <input type="range" id="eraserSlider"  min="16" max="120" value="48"> <span id="eraserVal"  style="color:#fff">48</span></label>
      <label><input type="checkbox" id="penOnlyChk" checked> 指スクロール・ペン描画</label>
    </div>
  </div>

  <!-- メインエリア -->
  <div id="mainArea">
    <!-- 描画エリア -->
    <div id="canvasWrap">
      <canvas id="drawCanvas"></canvas>
      <!-- 問題オーバーレイ -->
      <div id="qOverlay">
        <div class="q-num"  id="qNum">問題 1 / 10</div>
        <div class="q-text">
          <span id="qA">52</span><span class="qop" id="qOp">＋</span><span id="qB">57</span><span class="qop">＝</span>
        </div>
      </div>
    </div>

    <!-- サイドパネル -->
    <div id="sidePanel">
      <div class="side-label">解答</div>
      <div id="ansDisp">
        <span class="ans-ph" id="ansPh">?</span>
        <span id="ansText" style="display:none"></span>
      </div>
      <div id="correctHint"></div>
      <div id="feedback"></div>
      <div class="numpad">
        <button class="nk" onclick="ni('7')">7</button>
        <button class="nk" onclick="ni('8')">8</button>
        <button class="nk" onclick="ni('9')">9</button>
        <button class="nk" onclick="ni('4')">4</button>
        <button class="nk" onclick="ni('5')">5</button>
        <button class="nk" onclick="ni('6')">6</button>
        <button class="nk" onclick="ni('1')">1</button>
        <button class="nk" onclick="ni('2')">2</button>
        <button class="nk" onclick="ni('3')">3</button>
        <button class="nk del" onclick="nd()">⌫</button>
        <button class="nk" onclick="ni('0')">0</button>
        <button class="nk enter" onclick="sa()">決定<br>Enter</button>
      </div>
      <div style="height:4px"></div>
      <button class="nk dot" onclick="ni('.')" style="width:100%;aspect-ratio:auto;padding:8px;border-radius:10px;background:#fff;border:1.5px solid #e7e5e4;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;">．（小数点）</button>
    </div>
  </div>
</div>

<!-- 消しゴムカーソル -->
<div id="eraserCursor"></div>

<!-- 結果画面 -->
<div id="resultOverlay">
  <div class="r-icon"  id="rIcon">🎉</div>
  <div class="r-title" id="rTitle">合格！</div>
  <div class="r-score"><span id="rScore">10</span><span> / 10問正解</span></div>
  <div class="r-stats" id="rStats"></div>
  <div class="r-sub"   id="rSub"></div>
  <div class="r-btns">
    <button class="rb secondary" onclick="retryTest()">もう一度</button>
    <a href="top-home.html" class="rb primary" id="rNext">トップへ戻る</a>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
<script src="assets/auth.js"></script>
<script>
// ====================================================
// 単元定義
// ====================================================
const TEST_UNITS = {
  // ── 幼児・小1 ──────────────────────────────────
  'addition-10':           { name:'10までのたし算',        next:'subtraction-10',           gen(){ const a=r(1,9),b=r(1,10-a);      return{a,op:'＋',b,ans:a+b}; } },
  'subtraction-10':        { name:'10までのひき算',        next:'addition-20',              gen(){ const a=r(2,10),b=r(1,a-1);       return{a,op:'－',b,ans:a-b}; } },
  'addition-20':           { name:'20までのたし算',        next:'subtraction-20',           gen(){ const a=r(2,10),b=r(1,10);        return{a,op:'＋',b,ans:a+b}; } },
  'subtraction-20':        { name:'20までのひき算',        next:'addition-horizontal',      gen(){ const a=r(5,20),b=r(1,a-1);       return{a,op:'－',b,ans:a-b}; } },
  // ── 横式 ────────────────────────────────────────
  'addition-horizontal':   { name:'足し算（横式）',        next:'subtraction-horizontal',   gen(){ const a=r(11,99),b=r(1,50);       return{a,op:'＋',b,ans:a+b}; } },
  'subtraction-horizontal':{ name:'引き算（横式）',        next:'addition-hissan',          gen(){ const a=r(20,99),b=r(1,a-1);      return{a,op:'－',b,ans:a-b}; } },
  // ── 筆算 ────────────────────────────────────────
  'addition-hissan':       { name:'たし算（筆算）',        next:'subtraction-hissan',       gen(){ const a=r(11,999),b=r(11,999);    return{a,op:'＋',b,ans:a+b}; } },
  'subtraction-hissan':    { name:'ひき算（筆算）',        next:'multiplication-horizontal', gen(){ const a=r(50,999),b=r(10,a-1);   return{a,op:'－',b,ans:a-b}; } },
  'multiplication-horizontal':{ name:'かけ算（横式）',     next:'multiplication-hissan',    gen(){ const a=r(2,9),b=r(2,9);          return{a,op:'×',b,ans:a*b}; } },
  'multiplication-hissan': { name:'かけ算（筆算）',        next:'division-horizontal',      gen(){ const a=r(12,99),b=r(2,9);        return{a,op:'×',b,ans:a*b}; } },
  'division-horizontal':   { name:'わり算（横式）',        next:'division-hissan',          gen(){ const b=r(2,9),ans=r(2,9);        return{a:b*ans,op:'÷',b,ans}; } },
  'division-hissan':       { name:'わり算（筆算）',        next:'story-add-sub',            gen(){ const b=r(2,9),ans=r(10,99);      return{a:b*ans,op:'÷',b,ans}; } },
  // ── 文章題 ──────────────────────────────────────
  'story-add-sub':         { name:'文章題（たし算・ひき算）',next:'story-mul-div',          gen(){ const a=r(5,50),b=r(1,a);         return{a,op:'＋',b,ans:a+b}; } },
  'story-mul-div':         { name:'文章題（かけ算・わり算）',next:'fraction-add',           gen(){ const a=r(2,9),b=r(2,9);          return{a,op:'×',b,ans:a*b}; } },
  // ── 分数 ────────────────────────────────────────
  'fraction-add':          { name:'分数のたし算',          next:'fraction-sub',             gen(){ const d=r(2,8),a=r(1,d-1),b=r(1,d-1); return{a:`${a}/${d}`,op:'＋',b:`${b}/${d}`,ans:Math.round((a+b)/d*100)/100}; } },
  'fraction-sub':          { name:'分数のひき算',          next:'fraction-mul',             gen(){ const d=r(2,8),a=r(2,d-1),b=r(1,a-1); return{a:`${a}/${d}`,op:'－',b:`${b}/${d}`,ans:Math.round((a-b)/d*100)/100}; } },
  'fraction-mul':          { name:'分数のかけ算',          next:'fraction-div',             gen(){ const a1=r(1,5),a2=r(2,6),b1=r(1,5),b2=r(2,6); return{a:`${a1}/${a2}`,op:'×',b:`${b1}/${b2}`,ans:Math.round(a1*b1/(a2*b2)*1000)/1000}; } },
  'fraction-div':          { name:'分数のわり算',          next:'decimal-add',              gen(){ const a1=r(1,5),a2=r(2,6),b1=r(1,5),b2=r(2,6); return{a:`${a1}/${a2}`,op:'÷',b:`${b1}/${b2}`,ans:Math.round(a1*b2/(a2*b1)*1000)/1000}; } },
  // ── 小数 ────────────────────────────────────────
  'decimal-add':           { name:'小数のたし算・ひき算',  next:'decimal-mul',              gen(){ const a=Math.round(r(10,99))/10,b=Math.round(r(1,50))/10; return{a,op:'＋',b,ans:Math.round((a+b)*10)/10}; } },
  'decimal-mul':           { name:'小数のかけ算・わり算',  next:'decimal-hissan',           gen(){ const a=Math.round(r(10,99))/10,b=r(2,9);              return{a,op:'×',b,ans:Math.round(a*b*10)/10}; } },
  'decimal-hissan':        { name:'小数の筆算',            next:'yakubun',                  gen(){ const a=Math.round(r(100,999))/10,b=Math.round(r(10,99))/10; return{a,op:'＋',b,ans:Math.round((a+b)*10)/10}; } },
  // ── 単位・割合・図形ほか ────────────────────────
  'yakubun':               { name:'約分・通分',            next:'gaisuu',                   gen(){ const d=r(2,6),n=r(1,d-1);        return{a:`${n*2}/${d*2}`,op:'→約分→',b:`?/${d}`,ans:n}; } },
  'gaisuu':                { name:'がい数（四捨五入）',    next:'tansaku',                  gen(){ const a=r(1000,9999);              return{a,op:'百の位で四捨五入',b:'→',ans:Math.round(a/1000)*1000}; } },
  'tansaku':               { name:'長さの単位換算',        next:'tansaku-kasa',             gen(){ const a=r(1,9);                   return{a:`${a}km`,op:'＝',b:'?m',ans:a*1000}; } },
  'tansaku-kasa':          { name:'かさの単位換算',        next:'tansaku-omosa',            gen(){ const a=r(1,9);                   return{a:`${a}L`,op:'＝',b:'?dL',ans:a*10}; } },
  'tansaku-omosa':         { name:'重さの単位換算',        next:'hayasa',                   gen(){ const a=r(1,9);                   return{a:`${a}kg`,op:'＝',b:'?g',ans:a*1000}; } },
  'hayasa':                { name:'速さ（はじき）',        next:'wariai',                   gen(){ const s=r(40,120),t=r(1,5);       return{a:`速さ${s}km/h 時間${t}h`,op:'→距離',b:'?km',ans:s*t}; } },
  'wariai':                { name:'割合・百分率',          next:'tokei',                    gen(){ const w=r(1,9)*10;                return{a:`比べる量は全体の${w}%`,op:'全体=100',b:'割合',ans:w/100}; } },
  'tokei':                 { name:'とけいをよむ',          next:'tokei-keisan',             gen(){ const h=r(1,12),m=[0,5,10,15,20,25,30,35,40,45,50,55][r(0,11)]; return{a:`${h}時${m}分`,op:'→',b:'何時何分？',ans:h*100+m}; } },
  'tokei-keisan':          { name:'時刻の計算',            next:'zukei',                    gen(){ const h=r(8,15),m=r(0,5)*10,add=r(1,5)*10; return{a:`${h}時${m}分から${add}分後`,op:'→',b:'?',ans:(h*60+m+add)}; } },
  'zukei':                 { name:'面積（三角形など）',    next:'zukei-en',                 gen(){ const b=r(3,12),h=r(3,12);        return{a:`底辺${b}cm 高さ${h}cm`,op:'三角形の面積',b:'?cm²',ans:b*h/2}; } },
  'zukei-en':              { name:'円の面積',              next:'zukei-taieki',             gen(){ const rad=r(2,10);                return{a:`半径${rad}cm`,op:'円の面積',b:'?cm²',ans:Math.round(rad*rad*3.14*100)/100}; } },
  'zukei-taieki':          { name:'体積（直方体・立方体）',next:'zukei-entai',              gen(){ const l=r(2,8),w=r(2,8),h=r(2,8); return{a:`${l}×${w}×${h}cm`,op:'体積',b:'?cm³',ans:l*w*h}; } },
  'zukei-entai':           { name:'円柱の体積',            next:'hi',                       gen(){ const rad=r(2,6),h=r(3,10);       return{a:`半径${rad}cm 高さ${h}cm`,op:'円柱の体積',b:'?cm³',ans:Math.round(rad*rad*3.14*h*100)/100}; } },
  'hi':                    { name:'比',                    next:'hirei',                    gen(){ const a=r(1,5),b=r(1,5);          return{a:`${a*2}:${b*2}`,op:'→簡単な比',b:'?:?',ans:parseFloat(`${a}.${b}`)}; } },
  'hirei':                 { name:'比例・反比例',          next:'menseki',                  gen(){ const k=r(2,8),x=r(2,9);          return{a:`y=kx k=${k} x=${x}`,op:'y=',b:'?',ans:k*x}; } },
  'menseki':               { name:'面積の計算',            next:'hyakubunritsu',            gen(){ const a=r(3,12),b=r(3,12);        return{a:`縦${a}cm 横${b}cm`,op:'長方形の面積',b:'?cm²',ans:a*b}; } },
  'hyakubunritsu':         { name:'百分率',                next:'tsurukame',                gen(){ const w=r(1,9)*10;                return{a:`${w}%`,op:'→小数',b:'?',ans:w/100}; } },
  'tsurukame':             { name:'つるかめ算',            next:'basho',                    gen(){ const t=r(5,15),n=r(t,t*2);       return{a:`つる+かめ=${t}匹 あし=${n}本`,op:'つる',b:'?羽',ans:Math.round((n-t*2)/2)}; } }, // simplified
  'basho':                 { name:'場合の数',              next:null,                       gen(){ const n=r(3,6);                   return{a:`${n}人を1列に並べる`,op:'並び方',b:'?通り',ans:[1,1,2,6,24,120][n]}; } },
};
const TOTAL_Q=10;

// ====================================================
// 状態
// ====================================================
let unitId, unit, questions;
let currentQ=0, correctCnt=0, inputVal='', answered=false;
let startTime=null, timerInterval=null, elapsedSec=0;
let currentUser, userData;

// 描画
let penSize=5, eraserSize=48, penOnly=true, currentColor='#000000', tool='pen';
let drawing=false, points=[];
let bigCtx=null;
const eraserCursor=document.getElementById('eraserCursor');

// ====================================================
// 初期化
// ====================================================
requireAuth().then(({user,userData:ud})=>{
  currentUser=user; userData=ud;
  const params=new URLSearchParams(location.search);
  unitId=params.get('unit')||'addition-10';
  unit=TEST_UNITS[unitId];
  if(!unit){ alert('テストが見つかりません'); return; }
  questions=Array.from({length:TOTAL_Q},()=>unit.gen());
  document.getElementById('startTitle').textContent=unit.name+' テスト';
  document.getElementById('startUnit').textContent='全'+TOTAL_Q+'問　全問正解で合格';
  document.getElementById('startScreen').style.display='flex';
});

// ====================================================
// テスト開始
// ====================================================
document.getElementById('startBtn').addEventListener('click', ()=>{
  document.getElementById('startScreen').style.display='none';
  document.getElementById('testScreen').style.display='flex';
  document.getElementById('testScreen').style.flexDirection='column';
  document.getElementById('testScreen').style.height='100%';
  initCanvas();
  startTimer();
  showQuestion(0);
});

// ====================================================
// タイマー
// ====================================================
function startTimer(){
  startTime=Date.now(); elapsedSec=0;
  timerInterval=setInterval(()=>{
    elapsedSec=Math.floor((Date.now()-startTime)/1000);
    document.getElementById('tbTimer').textContent=fmtTime(elapsedSec);
  },1000);
}
function stopTimer(){ clearInterval(timerInterval); }
function fmtTime(s){ const m=Math.floor(s/60),ss=s%60; return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`; }

// ====================================================
// 問題表示
// ====================================================
function showQuestion(idx){
  currentQ=idx; answered=false; inputVal='';
  const q=questions[idx];
  document.getElementById('qA').textContent=q.a;
  document.getElementById('qOp').textContent=q.op;
  document.getElementById('qB').textContent=q.b;
  document.getElementById('qNum').textContent=`問題 ${idx+1} / ${TOTAL_Q}`;
  document.getElementById('tbQ').textContent=`問題 ${idx+1}/${TOTAL_Q}`;
  resetDisplay(); setNumpadEnabled(true); clearCanvas();
}

// ====================================================
// テンキー
// ====================================================
function ni(d){
  if(answered) return;
  if(inputVal.length>=5) return;
  if(d==='.' && inputVal.includes('.')) return;
  if(d==='.' && inputVal==='') inputVal='0';
  inputVal+=d; updateDisplay();
}
function nd(){ if(answered)return; inputVal=inputVal.slice(0,-1); updateDisplay(); }
function sa(){ submitAnswer(); }

function updateDisplay(){
  const ad=document.getElementById('ansDisp');
  const ph=document.getElementById('ansPh');
  const at=document.getElementById('ansText');
  if(inputVal===''){ph.style.display='';at.style.display='none';ad.className='';return;}
  ph.style.display='none'; at.style.display=''; at.textContent=inputVal;
  ad.className='has-input';
}

// ====================================================
// 答え合わせ
// ====================================================
async function submitAnswer(){
  if(answered||inputVal==='') return;
  answered=true; setNumpadEnabled(false);
  const q=questions[currentQ];
  const ua=parseFloat(inputVal);
  const correct=Math.abs(ua-q.ans)<0.001;
  if(correct) correctCnt++;

  const ad=document.getElementById('ansDisp');
  const fb=document.getElementById('feedback');
  const ch=document.getElementById('correctHint');
  if(correct){
    ad.className='correct pop'; fb.textContent='⭕️';
  } else {
    ad.className='wrong shake'; fb.textContent='❌';
    ch.textContent=`正解は ${q.ans}`; ch.style.display='';
  }
  document.getElementById('tbScore').textContent=`✅ ${correctCnt}問正解`;

  await sleep(correct?900:1500);
  if(currentQ+1<TOTAL_Q) showQuestion(currentQ+1);
  else showResult();
}

function resetDisplay(){
  document.getElementById('ansPh').style.display='';
  document.getElementById('ansText').style.display='none';
  document.getElementById('ansText').textContent='';
  document.getElementById('ansDisp').className='';
  document.getElementById('feedback').textContent='';
  document.getElementById('correctHint').style.display='none';
}

// ====================================================
// 結果 & 記録
// ====================================================
async function showResult(){
  stopTimer();
  const passed=correctCnt>=TOTAL_Q;
  document.getElementById('rIcon').textContent  = passed?'🎉':'😢';
  document.getElementById('rTitle').textContent = passed?'合格！':'もう少し！';
  document.getElementById('rScore').textContent = correctCnt;
  document.getElementById('rSub').textContent   = passed
    ? (unit.next?'全問正解！次のステージが解放されました！':'全問正解！素晴らしい！')
    : `全問正解が合格条件です。${correctCnt}問正解でした。もう一度チャレンジ！`;
  if(!passed) document.getElementById('rNext').style.display='none';
  else        document.getElementById('rNext').style.display='';

  // 年齢計算（生年月日から）
  const ageStr = calcAge(userData?.birthday);

  document.getElementById('rStats').innerHTML=`
    <div class="lbl">解答時間</div><div class="val">${fmtTime(elapsedSec)}</div>
    <div class="lbl">正解数</div><div class="val">${correctCnt} / ${TOTAL_Q}問</div>
    <div class="lbl">合格日</div><div class="val">${passed?today():'—'}</div>
    <div class="lbl">合格時の年齢</div><div class="val">${passed?ageStr:'—'}</div>
  `;

  document.getElementById('resultOverlay').classList.add('show');

  // Firestore保存
  if(currentUser){
    try{
      const ref=db.collection('users').doc(currentUser.uid).collection('progress').doc(unitId);
      const prev=(await ref.get()).data()||{};
      const data={
        unitId, lastScore:correctCnt, attempts:(prev.attempts||0)+1,
        bestScore:Math.max(correctCnt,prev.bestScore||0),
        bestTime: passed ? (prev.bestTime ? Math.min(elapsedSec,prev.bestTime) : elapsedSec) : (prev.bestTime||null),
        passed: passed||prev.passed||false,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
      };
      if(passed && !prev.passed){
        data.passedAt  = firebase.firestore.FieldValue.serverTimestamp();
        data.passedAge = ageStr;
        data.passedTime= elapsedSec;
      }
      await ref.set(data);
      if(passed && unit.next){
        await db.collection('users').doc(currentUser.uid).collection('progress').doc(unit.next)
          .set({unitId:unit.next,unlocked:true,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      }
    }catch(e){console.error(e);}
  }
}

// ====================================================
// 年齢計算
// ====================================================
function calcAge(birthday){
  if(!birthday) return '不明';
  const b=new Date(birthday), now=new Date();
  let y=now.getFullYear()-b.getFullYear();
  let m=now.getMonth()-b.getMonth();
  let d=now.getDate()-b.getDate();
  if(d<0){ m--; d+=new Date(now.getFullYear(),now.getMonth(),0).getDate(); }
  if(m<0){ y--; m+=12; }
  return `${y}歳${m}ヶ月${d}日`;
}
function today(){
  const n=new Date();
  return `${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')}`;
}

// ====================================================
// リトライ
// ====================================================
function retryTest(){
  questions=Array.from({length:TOTAL_Q},()=>unit.gen());
  currentQ=0; correctCnt=0; inputVal=''; answered=false;
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('rNext').style.display='';
  document.getElementById('tbScore').textContent='✅ 0問正解';
  startTimer(); showQuestion(0);
}

// ====================================================
// キャンバス（tablet-v2.js と同等の描画エンジン）
// ====================================================
function initCanvas(){
  const canvas=document.getElementById('drawCanvas');
  const wrap=document.getElementById('canvasWrap');
  function resize(){
    canvas.width=wrap.clientWidth; canvas.height=wrap.clientHeight;
    bigCtx=canvas.getContext('2d');
    bigCtx.lineCap='round'; bigCtx.lineJoin='round';
  }
  resize();
  new ResizeObserver(resize).observe(wrap);

  canvas.addEventListener('pointerdown', onDown, {passive:false});
  canvas.addEventListener('pointermove', onMove, {passive:false});
  canvas.addEventListener('pointerup',   onUp,   {passive:false});
  canvas.addEventListener('pointerleave',onUp,   {passive:false});
}

function onDown(e){
  e.preventDefault();
  if(penOnly && e.pointerType==='touch') return;
  drawing=true; points=[];
  if(!bigCtx) return;
  bigCtx.globalCompositeOperation=tool==='eraser'?'destination-out':'source-over';
  if(tool!=='eraser') bigCtx.strokeStyle=currentColor;
  canvas_setPointerCapture(e);
  const{x,y}=getXY(e); points.push({x,y});
}

function onMove(e){
  e.preventDefault();
  if(tool==='eraser') moveEraserCursor(e.clientX, e.clientY);
  if(!drawing||!bigCtx) return;
  const events=(e.getCoalescedEvents?e.getCoalescedEvents():null)||[e];
  for(const re of events) drawPoint(re);
}

function onUp(e){
  e.preventDefault();
  drawing=false; hideEraserCursor();
  if(bigCtx) bigCtx.globalCompositeOperation='source-over';
}

function drawPoint(e){
  const{x,y}=getXY(e);
  if(tool==='eraser'){
    bigCtx.beginPath(); bigCtx.arc(x,y,eraserSize/2,0,Math.PI*2); bigCtx.fill();
    return;
  }
  points.push({x,y});
  const n=points.length;
  bigCtx.lineWidth=penSize; bigCtx.strokeStyle=currentColor;
  if(n>=3){
    const p1=points[n-3],p2=points[n-2],p3=points[n-1];
    bigCtx.beginPath();
    bigCtx.moveTo((p1.x+p2.x)/2,(p1.y+p2.y)/2);
    bigCtx.quadraticCurveTo(p2.x,p2.y,(p2.x+p3.x)/2,(p2.y+p3.y)/2);
    bigCtx.stroke();
  } else if(n>=2){
    const prev=points[n-2];
    bigCtx.beginPath(); bigCtx.moveTo(prev.x,prev.y); bigCtx.lineTo(x,y); bigCtx.stroke();
  }
}

function getXY(e){ const r=document.getElementById('drawCanvas').getBoundingClientRect(); return{x:e.clientX-r.left,y:e.clientY-r.top}; }
function canvas_setPointerCapture(e){ try{document.getElementById('drawCanvas').setPointerCapture(e.pointerId);}catch(err){} }
function clearCanvas(){ if(bigCtx){ const c=document.getElementById('drawCanvas'); bigCtx.clearRect(0,0,c.width,c.height); } }
function moveEraserCursor(x,y){ const s=eraserSize+'px'; Object.assign(eraserCursor.style,{display:'block',width:s,height:s,left:x+'px',top:y+'px'}); }
function hideEraserCursor(){ eraserCursor.style.display='none'; }

// ====================================================
// ツールバー操作
// ====================================================
function setTool(t){
  tool=t;
  document.getElementById('tbbPen').className   ='tbb pen'   +(t==='pen'?   ' active-pen':'');
  document.getElementById('tbbEraser').className='tbb eraser'+(t==='eraser'?' active-eraser':'');
  document.getElementById('drawCanvas').style.cursor=t==='eraser'?'none':'crosshair';
}

document.getElementById('colorBtns').querySelectorAll('.color-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentColor=btn.dataset.c; setTool('pen');
    document.querySelectorAll('.color-btn').forEach(b=>b.style.outline='none');
    btn.style.outline='3px solid #fff'; btn.style.outlineOffset='2px';
  });
});

document.getElementById('penSizeSlider').addEventListener('input',function(){
  penSize=parseInt(this.value); document.getElementById('penSizeVal').textContent=this.value;
});
document.getElementById('eraserSlider').addEventListener('input',function(){
  eraserSize=parseInt(this.value); document.getElementById('eraserVal').textContent=this.value;
});
document.getElementById('penOnlyChk').addEventListener('change',function(){
  penOnly=this.checked;
});

function toggleSettings(){
  const p=document.getElementById('tb-cfg-panel');
  p.style.display=p.style.display==='flex'?'none':'flex';
}

// ====================================================
// ユーティリティ
// ====================================================
function setNumpadEnabled(en){ document.querySelectorAll('.nk').forEach(b=>b.disabled=!en); }
function r(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function sleep(ms){ return new Promise(res=>setTimeout(res,ms)); }

document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9') ni(e.key);
  if(e.key==='.') ni('.');
  if(e.key==='Backspace') nd();
  if(e.key==='Enter') sa();
});
</script>
</body>
</html>
