<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小数のひっ算 | うちトレ</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* ---- 小数ひっ算レイアウト ---- */
    .dec-problem{
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-start;  /* 上寄せ */
      padding-top: 10mm;            /* 問題番号の下に書き込みスペース確保 */
      padding-bottom: 2px;
    }

    /* 問題グリッドの行間を詰める（decimal-hissan専用） */
    .decimal-hissan-grid{
      grid-template-rows: repeat(6, 1fr);
      gap: 3mm 12mm;
      height: calc(297mm - 10mm - 18mm);
    }
    .dec-problem-num{
      position: absolute;
      top: -2px;
      left: 0;
      font-size: 13px;
      color: #475569;
    }
    /* 数字行 */
    .dec-row{
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      line-height: 1;
      margin-bottom: 1px;
    }
    /* 演算子 */
    .dec-op{
      font-size: 24px;
      font-weight: 700;
      width: 22px;
      text-align: center;
      margin-right: 2px;
    }
    /* 各桁セル */
    .dec-digit{
      font-size: 24px;
      font-weight: 700;
      width: 22px;
      text-align: center;
      letter-spacing: 0;
    }
    .dec-digit.empty{
      opacity: 0; /* 空白桁は非表示（スペース確保） */
    }
    /* 小数点 */
    .dec-dot{
      font-size: 24px;
      font-weight: 900;
      width: 10px;
      text-align: center;
      padding-bottom: 1px;
    }
    .dec-dot.empty{
      opacity: 0;
    }
    /* 横線 */
    .dec-line{
      border-bottom: 2px solid #000;
      width: 100%;
      margin-top: 3px;
    }
    /* 答えページ用 */
    .page.answer-page{
      height: auto;
      min-height: 80mm;
    }
  </style>
</head>
<body data-page-type="decimal-hissan">
  <div class="container">
    <!-- ロゴ：中央配置 -->
    <div class="page-logo-area no-print">
      <img src="logo.svg" alt="うちトレ">
      <div>
        <div class="logo-text">うちトレ</div>
        <div class="logo-sub">Uchitore</div>
      </div>
    </div>

    <div class="header-row no-print">
      <div>
        <div style="display:none;"></div>
        <h1>小数のひっ算</h1>
        <div class="small-note">小数点の位置を揃えて計算します。</div>
      </div>
      <div class="header-actions">
        <a href="top-home.html" class="secondary-button">トップへ戻る</a>
      </div>
    </div>

    <div class="card controls no-print">
      <div class="control-group">
        <label for="op">演算</label>
        <select id="op">
          <option value="add" selected>足し算（＋）</option>
          <option value="sub">引き算（－）</option>
        </select>
      </div>
      <div class="control-group">
        <label for="level">レベル</label>
        <select id="level">
          <option value="1" selected>小数第1位</option>
          <option value="2">小数第2位</option>
          <option value="12">混在</option>
        </select>
      </div>
      <div class="control-group">
        <label for="count">枚数</label>
        <select id="count">
          <option value="1">1</option>
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="20">20</option>
        </select>
      </div>
      <div class="page-actions">
        <button class="primary" onclick="generate()">生成</button>
        <button class="secondary" onclick="window.print()">印刷</button>
        <button class="secondary" onclick="downloadPDF()">PDF保存</button>
      </div>
    </div>

    <div id="pages"></div>
  </div>

  <script src="assets/tablet-v2.js?v=28"></script>
  <script>
  const MAX = 3000;

  function rand(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }

  function toFixed(n, places){
    return parseFloat(n.toFixed(places));
  }

  // 小数第p位の数を生成（整数部1〜2桁）
  function makeDecNum(places){
    const intPart = rand(1, 99);
    const fracPart = rand(1, Math.pow(10, places)-1); // 0は避ける
    const factor = Math.pow(10, places);
    return toFixed(intPart + fracPart/factor, places);
  }

  function makeProblem(op, level){
    for(let i=0; i<MAX; i++){
      // レベルに応じて小数桁数を決める
      let p1, p2;
      if(level === '1'){
        p1 = 1; p2 = 1;
      } else if(level === '2'){
        p1 = 2; p2 = 2;
      } else {
        // 混在：片方が第1位、もう片方が第2位
        p1 = rand(0,1) ? 1 : 2;
        p2 = rand(0,1) ? 1 : 2;
      }

      const a = makeDecNum(p1);
      const b = makeDecNum(p2);

      if(op === 'add'){
        const ans = toFixed(a + b, Math.max(p1, p2));
        if(ans > 0) return { a, b, ans, op: '＋' };
      } else {
        // 引き算: a > b を保証
        const big = a > b ? a : b;
        const small = a > b ? b : a;
        const ans = toFixed(big - small, Math.max(p1, p2));
        if(ans > 0) return { a: big, b: small, ans, op: '－' };
      }
    }
    return { a: 1.2, b: 0.3, ans: 1.5, op: '＋' };
  }

  // 数値を桁配列に分解
  // 戻り値: { int3, int2, int1, dot, frac1, frac2 }
  // 存在しない桁は null
  function parseDigits(num){
    const str = num.toString();
    const [intStr, fracStr=''] = str.split('.');
    const intPadded = intStr.padStart(3, '\x00'); // null charで左padding
    const fracPadded = (fracStr + '\x00\x00').slice(0,2);
    return {
      int3: intPadded[0] === '\x00' ? null : intPadded[0],
      int2: intPadded[1] === '\x00' ? null : intPadded[1],
      int1: intPadded[2],
      hasDot: fracStr.length > 0,
      frac1: fracPadded[0] === '\x00' ? null : fracPadded[0],
      frac2: fracPadded[1] === '\x00' ? null : fracPadded[1],
    };
  }

  // 1行分の桁HTMLを生成
  function digitRowHTML(digits, opSymbol){
    const d = (val, extra='') =>
      `<span class="dec-digit${val===null?' empty':''} ${extra}">${val===null?'0':val}</span>`;
    const dot = digits.hasDot
      ? `<span class="dec-dot">.</span>`
      : `<span class="dec-dot empty">.</span>`;
    const op = opSymbol
      ? `<span class="dec-op">${opSymbol}</span>`
      : `<span class="dec-op" style="opacity:0">＋</span>`;
    return `${op}${d(digits.int3)}${d(digits.int2)}${d(digits.int1)}${dot}${d(digits.frac1)}${d(digits.frac2)}`;
  }

  function problemHTML(num, prob){
    const da = parseDigits(prob.a);
    const db = parseDigits(prob.b);
    return `
      <div class="dec-problem">
        <div class="dec-problem-num">(${num})</div>
        <div class="dec-row">${digitRowHTML(da, null)}</div>
        <div class="dec-row">${digitRowHTML(db, prob.op)}</div>
        <div class="dec-line"></div>
      </div>`;
  }

  function answerHTML(num, prob){
    return `<div class="answer-item">
      <span class="answer-num">(${num})</span>
      <span class="answer-val">${prob.ans}</span>
    </div>`;
  }

  function wrapPage(page){
    const wrap = document.createElement('div');
    wrap.className = 'page-preview';
    const scaleBox = document.createElement('div');
    scaleBox.className = 'page-scale-box';
    scaleBox.appendChild(page);
    wrap.appendChild(scaleBox);
    return wrap;
  }

  function generate(){
    const op    = document.getElementById('op').value;
    const level = document.getElementById('level').value;
    const count = parseInt(document.getElementById('count').value);
    const container = document.getElementById('pages');
    container.innerHTML = '';

    const allProblems = [];

    for(let p=0; p<count; p++){
      const usedKeys = new Set();
      const problems = [];

      for(let i=1; i<=18; i++){
        let prob;
        for(let t=0; t<200; t++){
          prob = makeProblem(op, level);
          const key = `${prob.a},${prob.b}`;
          if(!usedKeys.has(key)){ usedKeys.add(key); break; }
        }
        problems.push(prob);
        allProblems.push({ pageNo: p+1, num: i, prob });
      }

      // 問題ページ
      const page = document.createElement('div');
      page.className = 'page';

      const grid = document.createElement('div');
      grid.className = 'problem-grid decimal-hissan-grid';
      problems.forEach((prob, idx) => {
        grid.innerHTML += problemHTML(idx+1, prob);
      });
      page.appendChild(grid);
      container.appendChild(wrapPage(page));
    }

    // 答えページ
    const ansPage = document.createElement('div');
    ansPage.className = 'page answer-page';

    const header = document.createElement('div');
    header.className = 'answer-page-header';
    header.textContent = `小数のひっ算（${op==='add'?'足し算':'引き算'}）　答え`;
    ansPage.appendChild(header);

    for(let p=1; p<=count; p++){
      const probs = allProblems.filter(x=>x.pageNo===p);
      const section = document.createElement('div');
      section.className = 'answer-section';
      if(count>1){
        const lbl = document.createElement('div');
        lbl.className = 'answer-section-label';
        lbl.textContent = `${p}枚目`;
        section.appendChild(lbl);
      }
      const grid = document.createElement('div');
      grid.className = 'answer-grid';
      probs.forEach(({num, prob}) => {
        const item = document.createElement('div');
        item.className = 'answer-item';
        item.innerHTML = `<span class="answer-num">(${num})</span><span class="answer-val">${prob.ans}</span>`;
        grid.appendChild(item);
      });
      section.appendChild(grid);
      ansPage.appendChild(section);
    }

    const ansWrap = document.createElement('div');
    ansWrap.className = 'page-preview';
    const ansScaleBox = document.createElement('div');
    ansScaleBox.className = 'page-scale-box';
    ansScaleBox.appendChild(ansPage);
    ansWrap.appendChild(ansScaleBox);
    container.appendChild(ansWrap);

    applyMobilePageScaling();
  }

  function applyMobilePageScaling(){
    document.querySelectorAll('.page-preview').forEach(wrapper => {
      const scaleBox = wrapper.querySelector('.page-scale-box');
      const page     = wrapper.querySelector('.page');
      if(!scaleBox || !page) return;
      if(page.classList.contains('answer-page')) return;
      wrapper.classList.remove('is-scaled');
      scaleBox.style.width = ''; scaleBox.style.height = '';
      page.style.transform = '';
      const pw = page.offsetWidth, ph = page.offsetHeight;
      if(!pw || !ph) return;
      if(window.innerWidth > 640 || window.matchMedia('print').matches){
        scaleBox.style.width = pw+'px'; scaleBox.style.height = ph+'px'; return;
      }
      const avail = Math.max(wrapper.clientWidth-8, 0);
      if(!avail) return;
      const scale = Math.min(1, avail/pw);
      wrapper.classList.add('is-scaled');
      scaleBox.style.width  = (pw*scale)+'px';
      scaleBox.style.height = (ph*scale)+'px';
      page.style.transform  = `scale(${scale})`;
    });
  }

  async function downloadPDF(){
    const pages = document.querySelectorAll('.page');
    if(!pages.length){ alert('先に「生成」を押してください。'); return; }
    if(!window.html2canvas || !window.jspdf){ alert('PDFライブラリが読み込めません。'); return; }
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    for(let i=0; i<pages.length; i++){
      const canvas = await html2canvas(pages[i], { scale:2, useCORS:true });
      if(i>0) pdf.addPage();
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
    }
    pdf.save('decimal_hissan.pdf');
  }

  window.addEventListener('DOMContentLoaded', () => {
    generate();
    let t;
    window.addEventListener('resize', () => { clearTimeout(t); t=setTimeout(applyMobilePageScaling,80); });
    window.addEventListener('beforeprint', applyMobilePageScaling);
    window.addEventListener('afterprint',  applyMobilePageScaling);
  });
  </script>
</body>
</html>
