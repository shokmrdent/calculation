<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小数の計算 | うちトレ</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body data-page-type="decimal">
  <div class="container">
    <!-- ロゴ：中央配置 -->
    <div class="page-logo-area no-print">
      <img src="logo.svg" alt="うちトレ">
      <div>
        <div class="logo-text">うちトレ</div>
        <div class="logo-sub">Uchitore</div>
      </div>
    </div>

    <div class="header-row no-print">
      <div>
        <div style="display:none;"></div>
        <h1>小数の計算</h1>
      </div>
      <div class="header-actions">
        <a href="top-home.html" class="secondary-button">トップへ戻る</a>
      </div>
    </div>

    <div class="card controls no-print">
      <div class="control-group">
        <label for="op">演算</label>
        <select id="op">
          <!-- options set dynamically by initPage() -->
        </select>
      </div>

      <div class="control-group">
        <label for="dec-places">小数桁数</label>
        <select id="dec-places">
          <option value="1" selected>小数第1位</option>
          <option value="2">小数第2位</option>
        </select>
      </div>

      <div class="control-group">
        <label for="count">枚数</label>
        <select id="count">
          <option value="1">1</option>
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="20">20</option>
        </select>
      </div>

      <div class="page-actions">
        <button class="primary" onclick="generate()">生成</button>
        <button class="secondary" onclick="window.print()">印刷</button>
        <button class="secondary" onclick="downloadPDF()">PDF保存</button>
      </div>
    </div>

    <div id="pages"></div>
  </div>
  <script>
  // URLパラメータに応じて選択肢と初期値を制限
  function initPage(){
    const params = new URLSearchParams(location.search);
    const opParam = params.get('op') || 'add';
    const sel = document.getElementById('op');
    sel.innerHTML = '';
    // add/subグループ or mul/divグループ
    if(opParam === 'add' || opParam === 'sub'){
      sel.innerHTML = '<option value="add">足し算（＋）</option><option value="sub">引き算（－）</option>';
    } else {
      sel.innerHTML = '<option value="mul">かけ算（×）</option><option value="div">割り算（÷）</option>';
    }
    sel.value = opParam;
    // タイトルも変える
    const h1 = document.querySelector('h1');
    if(h1) h1.textContent = (opParam==='add'||opParam==='sub') ? '小数の足し算・引き算' : '小数のかけ算・わり算';
  }
  window.addEventListener('DOMContentLoaded', initPage);
  </script>
  <script src="assets/fraction-generator.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.2.0/dist/signature_pad.umd.min.js"></script>
  <script src="assets/tablet-v2.js?v=28"></script>
<!-- ログインガード -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/assets/firebase-config.js"></script>
<script src="/assets/auth.js"></script>
<script>requireAuth();</script>
</body>
</html>
