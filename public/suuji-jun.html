<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>すうじのじゅんばん | うちトレ</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .jun-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8mm 14mm 8mm;
      box-sizing: border-box;
    }
    .jun-page-title {
      font-size: 20px;
      font-weight: 800;
      color: #1e293b;
      text-align: center;
      padding-bottom: 6px;
      border-bottom: 3px solid #fb923c;
      margin-bottom: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }
    .jun-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8mm 10mm;
      align-content: start;
    }
    .jun-problem {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 6px 12px;
      border-bottom: 1.5px solid #e2e8f0;
      font-size: 26px;
      font-weight: 900;
      font-family: 'Arial Rounded MT Bold', 'Noto Sans JP', sans-serif;
      position: relative;
    }
    .jun-pnum {
      font-size: 11px;
      font-family: 'Noto Sans JP', sans-serif;
      color: #94a3b8;
      font-weight: 400;
      position: absolute;
      top: -1px;
      left: 0;
    }
    .jun-num {
      color: #1e293b;
      min-width: 32px;
      text-align: center;
    }
    .jun-blank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border: 2.5px solid #fb923c;
      border-radius: 8px;
      background: #fff7ed;
      color: #fb923c;
      font-size: 22px;
    }
    .jun-sep {
      color: #94a3b8;
      font-size: 20px;
      font-weight: 400;
      margin: 0 1px;
    }
    .page.answer-page { height: auto; min-height: 80mm; }
  </style>
</head>
<body data-page-type="suuji-jun">
  <div class="container">
    <div class="page-logo-area no-print">
      <img src="logo.svg" alt="うちトレ">
      <div>
        <div class="logo-text">うちトレ</div>
        <div class="logo-sub">Uchitore</div>
      </div>
    </div>
    <div class="header-row no-print">
      <div><h1>すうじのじゅんばん</h1></div>
      <div class="header-actions">
        <a href="top-home.html" class="secondary-button">トップへ戻る</a>
      </div>
    </div>
    <div class="card controls no-print">
      <div class="control-group">
        <label for="range-type">はんい</label>
        <select id="range-type">
          <option value="1-10">１〜10</option>
          <option value="1-20" selected>１〜20</option>
          <option value="1-100">１〜100</option>
        </select>
      </div>
      <div class="control-group">
        <label for="count">まいすう</label>
        <select id="count">
          <option value="1">1</option>
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="20">20</option>
        </select>
      </div>
      <div class="page-actions">
        <button class="primary" onclick="generate()">生成</button>
        <button class="secondary" onclick="window.print()">印刷</button>
        <button class="secondary" onclick="downloadPDF()">PDF保存</button>
      </div>
    </div>
    <div id="pages"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.2.0/dist/signature_pad.umd.min.js"></script>
  <script src="assets/tablet-v2.js?v=28"></script>
  <script>
  function r(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

  function makeProblem(maxVal) {
    // 連続する4〜6個の数字列を作り、1〜2箇所を虫食いにする
    const len = r(5, 7);
    const start = r(1, maxVal - len);
    const nums = Array.from({length: len}, (_, i) => start + i);

    // 虫食い箇所を1〜2箇所ランダムに選ぶ（両端は空けない）
    const blanks = new Set();
    const numBlanks = len <= 5 ? 1 : r(1, 2);
    while (blanks.size < numBlanks) {
      blanks.add(r(1, len - 2)); // 両端以外
    }

    return { nums, blanks: [...blanks].sort((a,b)=>a-b) };
  }

  function problemHTML(idx, prob) {
    const parts = prob.nums.map((n, i) => {
      if (prob.blanks.includes(i)) {
        return `<span class="jun-blank">□</span>`;
      }
      return `<span class="jun-num">${n}</span>`;
    });
    // 間に → を入れる
    const joined = parts.join(`<span class="jun-sep">・</span>`);
    return `<div class="jun-problem">
      <span class="jun-pnum">(${idx})</span>
      &nbsp;&nbsp;&nbsp;
      ${joined}
    </div>`;
  }

  function generate() {
    const rangeVal = document.getElementById('range-type').value;
    const maxVal   = parseInt(rangeVal.split('-')[1]);
    const count    = parseInt(document.getElementById('count').value);
    const container = document.getElementById('pages');
    container.innerHTML = '';
    const allProblems = [];

    for (let p = 0; p < count; p++) {
      const probs = [];
      for (let i = 1; i <= 12; i++) {
        const prob = makeProblem(maxVal);
        probs.push(prob);
        allProblems.push({ pageNo: p+1, num: i, prob });
      }
      const page = document.createElement('div'); page.className = 'page';
      const inner = document.createElement('div'); inner.className = 'jun-page';

      const title = document.createElement('div'); title.className = 'jun-page-title';
      title.innerHTML = `📋 すうじのじゅんばん　<span style="font-size:14px;color:#94a3b8;font-weight:500">（１〜${maxVal}）</span>`;
      inner.appendChild(title);

      const grid = document.createElement('div'); grid.className = 'jun-grid';
      probs.forEach((prob, idx) => { grid.innerHTML += problemHTML(idx+1, prob); });
      inner.appendChild(grid);

      const instr = document.createElement('div');
      instr.style.cssText = 'font-size:12px;color:#94a3b8;margin-top:8px;font-family:Noto Sans JP,sans-serif;text-align:center';
      instr.textContent = '□ に はいる すうじを かきましょう';
      inner.appendChild(instr);

      page.appendChild(inner);
      container.appendChild(wrapPage(page));
    }

    // 答えページ
    const ansPage = document.createElement('div'); ansPage.className = 'page answer-page';
    const hdr = document.createElement('div'); hdr.className = 'answer-page-header';
    hdr.textContent = `すうじのじゅんばん（１〜${maxVal}）　こたえ`;
    ansPage.appendChild(hdr);

    for (let p = 1; p <= count; p++) {
      const probs = allProblems.filter(x => x.pageNo === p);
      const sec = document.createElement('div'); sec.className = 'answer-section';
      if (count > 1) {
        const l = document.createElement('div'); l.className = 'answer-section-label';
        l.textContent = `${p}まいめ`; sec.appendChild(l);
      }
      const grid = document.createElement('div'); grid.className = 'answer-grid';
      probs.forEach(({ num, prob }) => {
        const answers = prob.blanks.map(i => prob.nums[i]).join('、');
        const item = document.createElement('div'); item.className = 'answer-item';
        item.innerHTML = `<span class="answer-num">(${num})</span><span class="answer-val">${answers}</span>`;
        grid.appendChild(item);
      });
      sec.appendChild(grid); ansPage.appendChild(sec);
    }
    const aw = document.createElement('div'); aw.className = 'page-preview';
    const ab = document.createElement('div'); ab.className = 'page-scale-box';
    ab.appendChild(ansPage); aw.appendChild(ab); container.appendChild(aw);
    applyMobilePageScaling();
  }

  function wrapPage(page) {
    const wrap = document.createElement('div'); wrap.className = 'page-preview';
    const box  = document.createElement('div'); box.className  = 'page-scale-box';
    box.appendChild(page); wrap.appendChild(box); return wrap;
  }

  function applyMobilePageScaling() {
    document.querySelectorAll('.page-preview').forEach(wrapper => {
      const scaleBox = wrapper.querySelector('.page-scale-box');
      const page = wrapper.querySelector('.page');
      if (!scaleBox || !page) return;
      if (page.classList.contains('answer-page')) return;
      wrapper.classList.remove('is-scaled');
      scaleBox.style.width = ''; scaleBox.style.height = ''; page.style.transform = '';
      const pw = page.offsetWidth, ph = page.offsetHeight;
      if (!pw || !ph) return;
      if (window.innerWidth > 640 || window.matchMedia('print').matches) {
        scaleBox.style.width = pw + 'px'; scaleBox.style.height = ph + 'px'; return;
      }
      const avail = Math.max(wrapper.clientWidth - 8, 0); if (!avail) return;
      const scale = Math.min(1, avail / pw);
      wrapper.classList.add('is-scaled');
      scaleBox.style.width  = (pw * scale) + 'px';
      scaleBox.style.height = (ph * scale) + 'px';
      page.style.transform  = `scale(${scale})`;
    });
  }

  async function downloadPDF() {
    const pages = document.querySelectorAll('.page');
    if (!pages.length) { alert('先に「生成」を押してください。'); return; }
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    for (let i = 0; i < pages.length; i++) {
      const canvas = await html2canvas(pages[i], { scale: 2, useCORS: true });
      if (i > 0) pdf.addPage();
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
    }
    pdf.save('suuji-jun.pdf');
  }

  window.addEventListener('DOMContentLoaded', () => {
    generate();
    let t;
    window.addEventListener('resize', () => { clearTimeout(t); t = setTimeout(applyMobilePageScaling, 80); });
    window.addEventListener('beforeprint', applyMobilePageScaling);
    window.addEventListener('afterprint',  applyMobilePageScaling);
  });
  </script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/assets/firebase-config.js"></script>
<script src="/assets/auth.js"></script>
<script>requireAuth();</script>
</body>
</html>
