<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かけ算・わり算　文章題 | うちトレ</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* 文章題レイアウト */
    .story-page{
      width: 210mm;
      height: 297mm;
      background: #fff;
      margin: 0 auto 20px;
      padding: 12mm 14mm 14mm;
      box-sizing: border-box;
      border: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
    }
    .story-grid{
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(5, 1fr);
      gap: 4mm 8mm;
      flex: 1;
      min-height: 0;
    }
    .story-item{
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 4mm 5mm 3mm;
      display: flex;
      flex-direction: column;
      gap: 3mm;
    }
    .story-num{
      font-size: 11px;
      color: #475569;
      font-weight: 700;
    }
    .story-text{
      font-size: 12.5px;
      line-height: 1.75;
      color: #1e293b;
      flex: 1;
    }
    .story-write-area{
      display: flex;
      flex-direction: column;
      gap: 2mm;
    }
    .story-write-row{
      display: flex;
      align-items: center;
      gap: 3mm;
    }
    .story-write-label{
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      min-width: 14mm;
    }
    .story-write-line{
      flex: 1;
      border-bottom: 1.5px solid #94a3b8;
      height: 5mm;
    }
    /* 答えページ */
    .story-answer-page{
      width: 210mm;
      min-height: 80mm;
      background: #fff;
      margin: 0 auto 20px;
      padding: 10mm 14mm;
      box-sizing: border-box;
      border: 1px solid #e5e7eb;
    }

    @media print{
      body{ background: #fff; }
      .no-print{ display: none !important; }
      .container{ max-width: none; padding: 0; }
      .story-page,
      .story-answer-page{ margin: 0; border: none; }
    }
    @media(max-width:640px){
      .page-preview{ overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ロゴ：中央配置 -->
    <div class="page-logo-area no-print">
      <img src="logo.svg" alt="うちトレ">
      <div>
        <div class="logo-text">うちトレ</div>
        <div class="logo-sub">Uchitore</div>
      </div>
    </div>

    <div class="header-row no-print">
      <div>
        <div style="display:none;"></div>
        <h1>かけ算・わり算　文章題</h1>
        <div class="small-note">ランダム生成。10問／ページ。式と答えを書く。</div>
      </div>
      <div class="header-actions">
        <a href="top-home.html" class="secondary-button">トップへ戻る</a>
      </div>
    </div>

    <div class="card controls no-print">
      <div class="control-group">
        <label for="level">レベル</label>
        <select id="level">
          <option value="1" selected>九九（1〜9×1〜9）</option>
          <option value="2">2桁×1桁</option>
          <option value="3">3桁×1桁</option>
        </select>
      </div>
      <div class="control-group">
        <label for="op-type">演算</label>
        <select id="op-type">
          <option value="both" selected>かけ算・わり算 混在</option>
          <option value="add">かけ算のみ</option>
          <option value="sub">わり算のみ</option>
        </select>
      </div>
      <div class="control-group">
        <label for="count">枚数</label>
        <select id="count">
          <option value="1" selected>1</option>
          <option value="3">3</option>
          <option value="5">5</option>
        </select>
      </div>
      <div class="page-actions">
        <button class="primary" onclick="generate()">生成</button>
        <button class="secondary" onclick="window.print()">印刷</button>
        <button class="secondary" onclick="downloadPDF()">PDF保存</button>
      </div>
    </div>

    <div id="pages"></div>
  </div>

  <script src="assets/tablet-v2.js?v=28"></script>
  <script>
  function rand(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }

  // かけ算テンプレート
  // かけ算テンプレート
  const addTemplates = [
    (a,b) => `1はこに みかんが ${a}こ はいっています。\n${b}はこ では みかんは なんこですか。`,
    (a,b) => `1れつに ${a}にん ならんでいます。\n${b}れつ あると ぜんぶで なんにんですか。`,
    (a,b) => `おかしが 1ふくろに ${a}こ はいっています。\n${b}ふくろ かいました。\nぜんぶで なんこですか。`,
    (a,b) => `1まいに ${a}まい のシールを はりました。\n${b}まい では なんまい ひつようですか。`,
    (a,b) => `ノートが 1たばに ${a}さつ あります。\n${b}たば あると なんさつですか。`,
    (a,b) => `こどもが ${b}にん います。\n1人に えんぴつを ${a}ほん くばります。\nぜんぶで なんぼん ひつようですか。`,
    (a,b) => `1日に ${a}ページ 本を よみます。\n${b}日間 では なんページ よめますか。`,
    (a,b) => `テーブルが ${b}きゃく あります。\n1きゃくに いすが ${a}きゃく あります。\nいすは ぜんぶで なんきゃくですか。`,
  ];

  // わり算テンプレート
  const subTemplates = [
    (a,b) => `りんごが ${a*b}こ あります。\n${b}人で おなじ かずずつ わけると\n1人 なんこですか。`,
    (a,b) => `えんぴつが ${a*b}ほん あります。\n1人に ${b}ほんずつ くばると\nなんにんに くばれますか。`,
    (a,b) => `シールが ${a*b}まい あります。\n${b}まいずつ はこに いれると\nはこは なんこ できますか。`,
    (a,b) => `${a*b}このあめを ${b}人で おなじ かずずつ わけます。\n1人 なんこですか。`,
    (a,b) => `テープが ${a*b}cm あります。\n${b}cmずつ きると なんほん できますか。`,
    (a,b) => `本が ${a*b}さつ あります。\n1だんに ${b}さつ ならべると\nなんだん できますか。`,
    (a,b) => `${a*b}人の こどもを ${b}人ずつの グループに\nわけます。なんグループ できますか。`,
    (a,b) => `クッキーが ${a*b}こ あります。\n${b}まいの おさらに おなじかずずつ のせると\n1まい なんこですか。`,
  ];

  function makeNumbers(level){
    if(level === 1){
      // 九九
      const a = rand(2,9);
      const b = rand(2,9);
      return [a, b];
    } else if(level === 2){
      // 2桁×1桁
      const a = rand(11,99);
      const b = rand(2,9);
      return [a, b];
    } else {
      // 3桁×1桁
      const a = rand(101,999);
      const b = rand(2,9);
      return [a, b];
    }
  }

  function makeAddProblem(level){
    const [a, b] = makeNumbers(level);
    const tmpl = addTemplates[rand(0, addTemplates.length-1)];
    return { text: tmpl(a, b), answer: a * b, expr: `${a} × ${b} ＝ ${a*b}` };
  }

  function makeSubProblem(level){
    const [a, b] = makeNumbers(level);
    const tmpl = subTemplates[rand(0, subTemplates.length-1)];
    return { text: tmpl(a, b), answer: a, expr: `${a*b} ÷ ${b} ＝ ${a}` };
  }

  function makeProblem(level, opType){
    const useAdd = opType === 'add' ? true : opType === 'sub' ? false : rand(0,1) === 0;
    return useAdd ? makeAddProblem(level) : makeSubProblem(level);
  }

  function generate(){
    const level  = parseInt(document.getElementById('level').value);
    const opType = document.getElementById('op-type').value;
    const count  = parseInt(document.getElementById('count').value);
    const container = document.getElementById('pages');
    container.innerHTML = '';

    const allProblems = [];

    for(let p = 0; p < count; p++){
      const problems = Array.from({length:10}, () => makeProblem(level, opType));

      // 問題ページ
      const wrap = document.createElement('div');
      wrap.className = 'page-preview';
      const scaleBox = document.createElement('div');
      scaleBox.className = 'page-scale-box';

      const page = document.createElement('div');
      page.className = 'story-page';

      const grid = document.createElement('div');
      grid.className = 'story-grid';

      problems.forEach((prob, idx) => {
        const item = document.createElement('div');
        item.className = 'story-item';
        item.innerHTML = `
          <div class="story-num">(${idx+1})</div>
          <div class="story-text">${prob.text.replace(/\n/g,'<br>')}</div>
          <div class="story-write-area">
            <div class="story-write-row">
              <span class="story-write-label">式</span>
              <span class="story-write-line"></span>
            </div>
            <div class="story-write-row">
              <span class="story-write-label">答え</span>
              <span class="story-write-line"></span>
            </div>
          </div>`;
        grid.appendChild(item);
      });

      page.appendChild(grid);
      scaleBox.appendChild(page);
      wrap.appendChild(scaleBox);
      container.appendChild(wrap);

      allProblems.push({ pageNo: p+1, problems });
    }

    // 答えページ
    const ansWrap = document.createElement('div');
    ansWrap.className = 'page-preview';
    const ansScaleBox = document.createElement('div');
    ansScaleBox.className = 'page-scale-box';

    const ansPage = document.createElement('div');
    ansPage.className = 'story-answer-page';

    const header = document.createElement('div');
    header.className = 'answer-page-header';
    header.textContent = 'かけ算・わり算　文章題　答え';
    ansPage.appendChild(header);

    allProblems.forEach(({ pageNo, problems }) => {
      const section = document.createElement('div');
      section.className = 'answer-section';
      if(count > 1){
        const label = document.createElement('div');
        label.className = 'answer-section-label';
        label.textContent = `${pageNo}枚目`;
        section.appendChild(label);
      }
      const agrid = document.createElement('div');
      agrid.className = 'answer-grid';
      problems.forEach((prob, idx) => {
        const item = document.createElement('div');
        item.className = 'answer-item';
        item.innerHTML = `<span class="answer-num">(${idx+1})</span><span class="answer-val" style="font-size:12px;font-weight:700;">${prob.expr}</span>`;
        agrid.appendChild(item);
      });
      section.appendChild(agrid);
      ansPage.appendChild(section);
    });

    ansScaleBox.appendChild(ansPage);
    ansWrap.appendChild(ansScaleBox);
    container.appendChild(ansWrap);

    // スケーリング
    if(typeof applyMobilePageScaling === 'function') applyMobilePageScaling();
  }

  async function downloadPDF(){
    const pages = document.querySelectorAll('.story-page, .story-answer-page');
    if(!pages.length){ alert('先に「生成」を押してください。'); return; }
    if(!window.html2canvas || !window.jspdf){ alert('PDFライブラリの読み込みに失敗しました。'); return; }
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    for(let i=0; i<pages.length; i++){
      const canvas = await html2canvas(pages[i], { scale:2, useCORS:true });
      const img = canvas.toDataURL('image/png');
      if(i > 0) pdf.addPage();
      pdf.addImage(img, 'PNG', 0, 0, 210, 297);
    }
    pdf.save('story_mul_div.pdf');
  }

  window.addEventListener('DOMContentLoaded', generate);
  </script>
</body>
</html>
