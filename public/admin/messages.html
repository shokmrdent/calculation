<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ管理 | うちトレ管理</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/shared-auth.css">
<style>
body { background: #f0f2f5; }
.admin-layout { display: flex; min-height: 100vh; }
.sidebar {
  width: 220px; flex-shrink: 0; background: #1c1917; color: #fff;
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.sidebar-logo {
  padding: 20px; font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900;
  color: var(--orange); border-bottom: 1px solid #292524;
}
.sidebar-logo span { color: #fff; font-size: 13px; display: block; font-weight: 400; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 16px 0; }
.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px; color: #a8a29e; text-decoration: none;
  font-size: 14px; font-weight: 700; transition: .15s;
  border-left: 3px solid transparent;
}
.sidebar-item:hover  { background: #292524; color: #fff; }
.sidebar-item.active { background: #292524; color: var(--orange); border-left-color: var(--orange); }
.sidebar-item .icon  { font-size: 18px; }
.sidebar-bottom { padding: 16px 20px; border-top: 1px solid #292524; }
.admin-name { font-size: 12px; color: #78716c; margin-bottom: 10px; }

/* メッセージ2カラムレイアウト */
.msg-layout {
  display: flex; flex: 1; height: 100vh; overflow: hidden;
}
.ticket-list-pane {
  width: 320px; flex-shrink: 0;
  background: #fff; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.ticket-list-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 18px; font-weight: 900;
}
.ticket-list-search {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.ticket-list-search input {
  width: 100%; padding: 8px 12px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font: inherit; font-size: 13px; outline: none;
}
.ticket-list-scroll { flex: 1; overflow-y: auto; }
.ticket-row {
  padding: 14px 16px;
  border-bottom: 1px solid #f5f5f4;
  cursor: pointer; transition: .12s;
}
.ticket-row:hover  { background: #fafaf9; }
.ticket-row.active { background: #fff7ed; }
.ticket-row.unread { background: #eff6ff; }
.ticket-row-user   { font-weight: 800; font-size: 14px; }
.ticket-row-subject{ font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ticket-row-meta   { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; font-size: 11px; color: var(--muted); }

/* チャットペイン */
.chat-pane {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: #fff;
}
.chat-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.chat-header-info .name  { font-size: 16px; font-weight: 900; }
.chat-header-info .email { font-size: 12px; color: var(--muted); }
.chat-messages {
  flex: 1; overflow-y: auto;
  padding: 24px;
  display: flex; flex-direction: column; gap: 16px;
}
.bubble-row { display: flex; gap: 10px; }
.bubble-row.admin-send { flex-direction: row-reverse; }
.bubble {
  max-width: 75%; padding: 12px 16px;
  border-radius: 16px; font-size: 14px; line-height: 1.7;
}
.bubble-row.user-msg   .bubble { background: #f5f5f4; border-radius: 4px 16px 16px 16px; }
.bubble-row.admin-send .bubble { background: var(--orange); color: #fff; border-radius: 16px 4px 16px 16px; }
.bubble-time { font-size: 11px; color: var(--muted); align-self: flex-end; flex-shrink: 0; }
.bubble-row.admin-send .bubble-time { order: -1; }
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}

.chat-input {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; align-items: flex-end;
}
.chat-input textarea {
  flex: 1; padding: 12px 14px;
  border: 2px solid var(--border); border-radius: 12px;
  font: inherit; font-size: 14px; resize: none; min-height: 60px; max-height: 140px;
  outline: none; transition: border-color .15s;
}
.chat-input textarea:focus { border-color: var(--orange); }

.empty-chat {
  flex: 1; display: flex; align-items: center; justify-content: center;
  text-align: center; color: var(--muted); padding: 40px;
}
.empty-chat .icon { font-size: 48px; margin-bottom: 12px; }

@media (max-width: 900px) {
  .sidebar { width: 56px; }
  .sidebar-logo, .sidebar-logo span, .admin-name, .sidebar-item > *:not(.icon), .sidebar-bottom .btn { display: none; }
  .sidebar-item { padding: 14px; justify-content: center; }
  .sidebar-item .icon { font-size: 22px; }
  .sidebar-bottom { padding: 12px 0; display: flex; justify-content: center; }
  .ticket-list-pane { width: 260px; }
}
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">うちトレ<span>管理者パネル</span></div>
    <nav class="sidebar-nav">
      <a href="index.html"    class="sidebar-item"><span class="icon">📊</span> ダッシュボード</a>
      <a href="accounts.html" class="sidebar-item"><span class="icon">👥</span> アカウント管理</a>
      <a href="messages.html" class="sidebar-item active">
        <span class="icon">💬</span> お問い合わせ
        <span id="msgBadge" style="background:var(--red);color:#fff;border-radius:999px;padding:2px 7px;font-size:11px;margin-left:auto;display:none"></span>
      </a>
      <div style="height:1px;background:#292524;margin:8px 0"></div>
      <a href="/top-home.html" class="sidebar-item" style="color:#94a3b8">
        <span class="icon">📚</span> 問題ページへ
      </a>
    </nav>
    <div class="sidebar-bottom">
      <div class="admin-name" id="adminName"></div>
      <button class="btn btn-secondary btn-sm btn-full" onclick="signOutUser()">ログアウト</button>
    </div>
  </aside>

  <!-- 2カラムメッセージUI -->
  <div class="msg-layout">
    <!-- チケット一覧 -->
    <div class="ticket-list-pane">
      <div class="ticket-list-header">💬 お問い合わせ</div>
      <div class="ticket-list-search">
        <input type="text" id="ticketSearch" placeholder="🔍 検索..." oninput="filterTickets()">
      </div>
      <div style="display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border)">
        <button class="btn btn-sm" id="filterAll"    onclick="setFilter('all',this)"    style="flex:1;background:var(--orange);color:#fff">すべて</button>
        <button class="btn btn-sm btn-secondary" id="filterOpen"   onclick="setFilter('open',this)"   style="flex:1">対応中</button>
        <button class="btn btn-sm btn-secondary" id="filterClosed" onclick="setFilter('closed',this)" style="flex:1">完了</button>
      </div>
      <div class="ticket-list-scroll" id="ticketListEl">
        <div style="padding:40px;text-align:center;color:var(--muted)">読み込み中...</div>
      </div>
    </div>

    <!-- チャットエリア -->
    <div class="chat-pane">
      <div class="empty-chat" id="emptyChatMsg">
        <div>
          <div class="icon">👈</div>
          <p>左のリストからチケットを選択してください</p>
        </div>
      </div>

      <div id="chatArea" style="display:none;flex:1;flex-direction:column;overflow:hidden">
        <div class="chat-header">
          <div class="chat-header-info">
            <div class="name"  id="chatUserName">—</div>
            <div class="email" id="chatSubject">—</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span id="chatStatusBadge" class="badge"></span>
            <button id="toggleStatusBtn" class="btn btn-secondary btn-sm" onclick="toggleStatus()">
              クローズ
            </button>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input" id="chatInputEl">
          <textarea id="adminReply" placeholder="返信を入力... (Ctrl+Enter で送信)"></textarea>
          <button class="btn btn-primary" id="adminSendBtn" onclick="adminSendReply()">
            <span class="btn-label">送信</span>
            <div class="loader"></div>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../assets/firebase-config.js"></script>
<script src="../assets/auth.js"></script>
<script>
let allTickets = [];
let filterStatus = 'all';
let currentTicketId = null;
let unsubChat = null;

requireAdmin().then(({ userData }) => {
  document.getElementById('adminName').textContent = userData.name || '管理者';
  loadTickets();
});

// ── チケット一覧リアルタイム ──────────────────────
function loadTickets() {
  db.collection('tickets').orderBy('updatedAt', 'desc')
    .onSnapshot(snap => {
      allTickets = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTickets();

      const unread = allTickets.filter(t => t.unreadAdmin).length;
      const badge  = document.getElementById('msgBadge');
      badge.textContent  = unread;
      badge.style.display = unread > 0 ? '' : 'none';
    });
}

function setFilter(val, btn) {
  filterStatus = val;
  ['filterAll','filterOpen','filterClosed'].forEach(id => {
    document.getElementById(id).className = 'btn btn-sm btn-secondary';
    document.getElementById(id).style.cssText = 'flex:1';
  });
  btn.className = 'btn btn-sm';
  btn.style.cssText = 'flex:1;background:var(--orange);color:#fff';
  renderTickets();
}

function filterTickets() { renderTickets(); }

function renderTickets() {
  const q = document.getElementById('ticketSearch').value.toLowerCase();
  const filtered = allTickets.filter(t => {
    const matchS = filterStatus === 'all' || t.status === filterStatus;
    const matchQ = !q || (t.userName||'').toLowerCase().includes(q) ||
                   (t.subject||'').toLowerCase().includes(q);
    return matchS && matchQ;
  });

  const el = document.getElementById('ticketListEl');
  if (filtered.length === 0) {
    el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">チケットなし</div>';
    return;
  }

  el.innerHTML = filtered.map(t => {
    const lastMsg = t.messages?.[t.messages.length - 1]?.text || '';
    const d = t.updatedAt?.toDate ? t.updatedAt.toDate().toLocaleDateString('ja-JP') : '';
    const isActive = t.id === currentTicketId;
    return `
      <div class="ticket-row ${t.unreadAdmin ? 'unread' : ''} ${isActive ? 'active' : ''}"
           onclick="openTicket('${t.id}')">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="ticket-row-user">
            ${t.unreadAdmin ? '🔴 ' : ''}${t.userName || t.userEmail || '—'}
          </div>
          <span class="badge ${t.status==='open'?'badge-active':'badge-canceled'}" style="font-size:10px">
            ${t.status === 'open' ? '対応中' : '完了'}
          </span>
        </div>
        <div class="ticket-row-subject">${t.subject || '—'}</div>
        <div class="ticket-row-meta">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px">${lastMsg}</span>
          <span>${d}</span>
        </div>
      </div>`;
  }).join('');
}

// ── チケット詳細 ────────────────────────────────
function openTicket(ticketId) {
  currentTicketId = ticketId;
  renderTickets();

  document.getElementById('emptyChatMsg').style.display = 'none';
  document.getElementById('chatArea').style.display     = 'flex';

  // 未読クリア
  db.collection('tickets').doc(ticketId).update({ unreadAdmin: false }).catch(() => {});

  if (unsubChat) unsubChat();
  unsubChat = db.collection('tickets').doc(ticketId)
    .onSnapshot(doc => {
      if (!doc.exists) return;
      const d = doc.data();

      document.getElementById('chatUserName').textContent = d.userName || d.userEmail || '—';
      document.getElementById('chatSubject').textContent  = `📌 ${d.subject}`;

      const statusBadge = document.getElementById('chatStatusBadge');
      statusBadge.className = `badge ${d.status==='open'?'badge-active':'badge-canceled'}`;
      statusBadge.textContent = d.status === 'open' ? '対応中' : '完了';

      const toggleBtn = document.getElementById('toggleStatusBtn');
      toggleBtn.textContent = d.status === 'open' ? '✅ クローズ' : '🔁 再オープン';

      // 入力欄はクローズ後も使えるようにしておく（管理者は常に返信可）
      document.getElementById('chatInputEl').style.display = '';

      // メッセージ描画
      const msgs = d.messages || [];
      document.getElementById('chatMessages').innerHTML =
        msgs.length === 0
          ? '<div style="color:var(--muted);text-align:center">メッセージなし</div>'
          : msgs.map(m => {
              const isAdmin = m.role === 'admin';
              const ts = m.createdAt
                ? new Date(m.createdAt.toDate ? m.createdAt.toDate() : m.createdAt)
                    .toLocaleString('ja-JP', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
                : '';
              return `
                <div class="bubble-row ${isAdmin ? 'admin-send' : 'user-msg'}">
                  <div class="avatar" style="background:${isAdmin?'#fff7ed':'#f5f5f4'}">${isAdmin?'🧑‍💼':'👤'}</div>
                  <div class="bubble">${escHtml(m.text)}</div>
                  <div class="bubble-time">${ts}</div>
                </div>`;
            }).join('');

      const el = document.getElementById('chatMessages');
      el.scrollTop = el.scrollHeight;
    });
}

// ── 返信送信 ────────────────────────────────────
async function adminSendReply() {
  const text = document.getElementById('adminReply').value.trim();
  if (!text || !currentTicketId) return;

  const btn = document.getElementById('adminSendBtn');
  btn.classList.add('loading'); btn.disabled = true;

  try {
    await db.collection('tickets').doc(currentTicketId).update({
      messages: firebase.firestore.FieldValue.arrayUnion({
        role: 'admin', text, createdAt: new Date()
      }),
      updatedAt:   firebase.firestore.FieldValue.serverTimestamp(),
      unreadAdmin: false,
      unreadUser:  true,
      status:      'open',
    });
    document.getElementById('adminReply').value = '';
  } catch (e) {
    showToast('送信失敗: ' + e.message, 'error');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

// Ctrl+Enter で送信
document.getElementById('adminReply').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); adminSendReply(); }
});

// ── ステータス切替 ────────────────────────────────
async function toggleStatus() {
  if (!currentTicketId) return;
  const doc    = await db.collection('tickets').doc(currentTicketId).get();
  const status = doc.data()?.status === 'open' ? 'closed' : 'open';
  await db.collection('tickets').doc(currentTicketId).update({
    status, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  showToast(status === 'closed' ? 'チケットをクローズしました' : 'チケットを再オープンしました');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
