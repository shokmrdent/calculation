<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アカウント管理 | うちトレ管理</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/shared-auth.css">
<style>
body { background: #f0f2f5; }
.admin-layout { display: flex; min-height: 100vh; }
.sidebar {
  width: 220px; flex-shrink: 0;
  background: #1c1917; color: #fff;
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.sidebar-logo {
  padding: 20px;
  font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900;
  color: var(--orange); border-bottom: 1px solid #292524;
}
.sidebar-logo span { color: #fff; font-size: 13px; display: block; font-family: inherit; font-weight: 400; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 16px 0; }
.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px; color: #a8a29e; text-decoration: none;
  font-size: 14px; font-weight: 700; transition: .15s;
  border-left: 3px solid transparent;
}
.sidebar-item:hover  { background: #292524; color: #fff; }
.sidebar-item.active { background: #292524; color: var(--orange); border-left-color: var(--orange); }
.sidebar-item .icon  { font-size: 18px; flex-shrink: 0; }
.sidebar-bottom { padding: 16px 20px; border-top: 1px solid #292524; }
.admin-name { font-size: 12px; color: #78716c; margin-bottom: 10px; }
.main-content { flex: 1; padding: 32px; min-width: 0; }

/* 検索バー */
.search-bar {
  display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
}
.search-bar input {
  flex: 1; min-width: 200px;
  padding: 10px 14px; border: 2px solid var(--border);
  border-radius: 10px; font: inherit; font-size: 14px;
  outline: none; transition: border-color .15s; background: #fff;
}
.search-bar input:focus { border-color: var(--orange); }
.search-bar select {
  padding: 10px 14px; border: 2px solid var(--border);
  border-radius: 10px; font: inherit; font-size: 14px;
  outline: none; background: #fff; cursor: pointer;
}
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">うちトレ<span>管理者パネル</span></div>
    <nav class="sidebar-nav">
      <a href="index.html"    class="sidebar-item"><span class="icon">📊</span> ダッシュボード</a>
      <a href="accounts.html" class="sidebar-item active"><span class="icon">👥</span> アカウント管理</a>
      <a href="messages.html" class="sidebar-item">
        <span class="icon">💬</span> お問い合わせ
        <span id="msgBadge" style="background:var(--red);color:#fff;border-radius:999px;padding:2px 7px;font-size:11px;margin-left:auto;display:none"></span>
      </a>
      <div style="height:1px;background:#292524;margin:8px 0"></div>
      <a href="/top-home.html" class="sidebar-item" style="color:#94a3b8">
        <span class="icon">📚</span> 問題ページへ
      </a>
    </nav>
    <div class="sidebar-bottom">
      <div class="admin-name" id="adminName"></div>
      <button class="btn btn-secondary btn-sm btn-full" onclick="signOutUser()">ログアウト</button>
    </div>
  </aside>

  <main class="main-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px">
      <div style="font-size:26px;font-weight:900">👥 アカウント管理</div>
      <button class="btn btn-primary" onclick="openCreateModal()">
        ➕ アカウント作成
      </button>
    </div>

    <div class="card">
      <!-- 検索バー -->
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 名前・メール・IDで検索..." oninput="filterTable()">
        <select id="statusFilter" onchange="filterTable()">
          <option value="">すべてのステータス</option>
          <option value="active">利用中</option>
          <option value="canceled">解約済み</option>
          <option value="pending">処理中</option>
        </select>
      </div>

      <div style="font-size:13px;color:var(--muted);margin-bottom:16px">
        <span id="userCount">—</span> 件表示
      </div>

      <div class="table-wrap">
        <table id="userTable">
          <thead>
            <tr>
              <th>名前</th>
              <th>メールアドレス</th>
              <th>ロール</th>
              <th>ステータス</th>
              <th>同時接続上限</th>
              <th>登録日</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="7" style="text-align:center;color:var(--muted);padding:40px">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- アカウント作成モーダル -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">➕ アカウント作成</div>
      <button class="modal-close" onclick="closeModal('createModal')">✕</button>
    </div>
    <div id="createMsg" class="msg-box"></div>
    <div class="form-group">
      <label>お名前</label>
      <input type="text" id="c-name" placeholder="山田 太郎">
    </div>
    <div class="form-group">
      <label>生年月日</label>
      <input type="date" id="c-birthday">
    </div>
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" id="c-email" placeholder="example@email.com">
    </div>
    <div class="form-group">
      <label>電話番号</label>
      <input type="tel" id="c-phone" placeholder="090-0000-0000">
    </div>
    <div class="form-group">
      <label>初期パスワード</label>
      <input type="text" id="c-password" placeholder="8文字以上">
      <div class="form-hint">ユーザーには別途メールで通知してください</div>
    </div>
    <div class="form-group">
      <label>ロール</label>
      <select id="c-role">
        <option value="user">一般ユーザー</option>
        <option value="admin">管理者</option>
      </select>
    </div>
    <div class="form-group">
      <label>同時接続可能台数</label>
      <input type="number" id="c-sessions" value="1" min="1" max="10">
    </div>
    <div style="display:flex;gap:12px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal('createModal')">キャンセル</button>
      <button class="btn btn-primary" id="createBtn" style="flex:1" onclick="createAccount()">
        <span class="btn-label">作成する</span>
        <div class="loader"></div>
      </button>
    </div>
  </div>
</div>

<!-- アカウント編集モーダル -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">✏️ アカウント編集</div>
      <button class="modal-close" onclick="closeModal('editModal')">✕</button>
    </div>
    <div id="editMsg" class="msg-box"></div>
    <div class="form-group">
      <label>ユーザーID</label>
      <input type="text" id="e-uid" readonly style="background:#f5f5f4;color:var(--muted)">
    </div>
    <div class="form-group">
      <label>お名前</label>
      <input type="text" id="e-name">
    </div>
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" id="e-email">
    </div>
    <div class="form-group">
      <label>電話番号</label>
      <input type="tel" id="e-phone">
    </div>
    <div class="form-group">
      <label>ステータス</label>
      <select id="e-status">
        <option value="active">利用中</option>
        <option value="canceled">解約済み</option>
        <option value="pending">処理中</option>
      </select>
    </div>
    <div class="form-group">
      <label>同時接続可能台数</label>
      <input type="number" id="e-sessions" min="1" max="10">
      <div class="form-hint">例: 1=1台のみ、3=3台まで同時接続可</div>
    </div>
    <div class="form-group">
      <label>ロール</label>
      <select id="e-role">
        <option value="user">一般ユーザー</option>
        <option value="admin">管理者</option>
      </select>
    </div>
    <div style="display:flex;gap:12px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal('editModal')">キャンセル</button>
      <button class="btn btn-primary" id="editSaveBtn" style="flex:1" onclick="saveEdit()">
        <span class="btn-label">保存する</span>
        <div class="loader"></div>
      </button>
    </div>
  </div>
</div>


<!-- 顧客詳細モーダル -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <div class="modal-title" id="detailModalTitle">👤 顧客詳細</div>
      <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    </div>

    <!-- 基本情報（読み取り専用） -->
    <div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">基本情報</div>
      <div id="detailBasicInfo" style="display:grid;gap:8px;font-size:14px"></div>
    </div>

    <!-- 管理者作成のアカウントのみ編集可 -->
    <div id="detailEditSection" style="display:none">
      <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">編集</div>
      <div id="editMsg2" class="msg-box"></div>
      <div class="form-group">
        <label>お名前</label>
        <input type="text" id="d-name">
      </div>
      <div class="form-group">
        <label>電話番号</label>
        <input type="tel" id="d-phone">
      </div>
      <div class="form-group">
        <label>ステータス</label>
        <select id="d-status">
          <option value="active">利用中</option>
          <option value="canceled">解約済み</option>
          <option value="pending">処理中</option>
        </select>
      </div>
      <div class="form-group">
        <label>同時接続台数</label>
        <input type="number" id="d-sessions" min="1" max="10">
      </div>
      <button class="btn btn-primary" id="detailSaveBtn" onclick="saveDetailEdit()">
        <span class="btn-label">💾 保存する</span>
        <div class="loader"></div>
      </button>
    </div>

    <!-- 進捗情報 -->
    <div style="margin-top:16px">
      <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">🏆 テスト合格記録</div>
      <div id="detailProgress" style="font-size:13px;color:var(--muted)">読み込み中...</div>
    </div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../assets/firebase-config.js"></script>
<script src="../assets/auth.js"></script>
<script>
let allUsers = [];
let editingUid = null;
let currentAdminUid = null;

requireAdmin().then(({ user, userData }) => {
  currentAdminUid = user.uid;
  document.getElementById('adminName').textContent = userData.name || '管理者';
  loadUsers();
  checkUnreadMessages();
});

// ── ユーザー一覧読み込み ─────────────────────────
function loadUsers() {
  db.collection('users').orderBy('createdAt', 'desc')
    .onSnapshot(async snap => {
      allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      // 管理者自身が一覧に含まれていない場合（createdAtなし等）は個別取得して先頭に追加
      if (currentAdminUid && !allUsers.find(u => u.id === currentAdminUid)) {
        const adminSnap = await db.collection('users').doc(currentAdminUid).get();
        if (adminSnap.exists) {
          allUsers.unshift({ id: adminSnap.id, ...adminSnap.data() });
        }
      }

      filterTable();
    });
}

// ── テーブルフィルタリング ───────────────────────
function filterTable() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;

  const filtered = allUsers.filter(u => {
    const matchQ = !q || (
      (u.name  || '').toLowerCase().includes(q) ||
      (u.email || '').toLowerCase().includes(q) ||
      (u.id    || '').toLowerCase().includes(q)
    );
    const matchS = !status || u.subscriptionStatus === status;
    return matchQ && matchS;
  });

  document.getElementById('userCount').textContent = filtered.length;

  const tbody = document.getElementById('userTableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:40px">該当するユーザーがいません</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(u => {
    const s = statusBadge(u.subscriptionStatus);
    const r = roleBadge(u.role);
    const d = u.createdAt?.toDate ? u.createdAt.toDate().toLocaleDateString('ja-JP') : '—';
    const isSelf = u.id === currentAdminUid;
    return `
      <tr${isSelf ? ' style="background:#fffbf0"' : ''}>
        <td style="cursor:pointer" onclick="openDetailModal('${u.id}')">
          <div style="font-weight:700;color:var(--blue);text-decoration:underline">${u.name || '—'}${isSelf ? ' <span style="font-size:11px;color:#f59e0b;font-weight:400">(あなた)</span>' : ''}</div>
        </td>
        <td style="font-size:13px">${u.email || '—'}</td>
        <td>${r}</td>
        <td>${s}</td>
        <td style="text-align:center">
          <span style="font-weight:900;font-size:18px;color:var(--blue)">${u.maxConcurrentSessions || 1}</span>
          <span style="font-size:11px;color:var(--muted)">台</span>
        </td>
        <td style="font-size:13px">${d}</td>
        <td>
          <button class="btn btn-secondary btn-sm" onclick="openEditModal('${u.id}')">編集</button>
        </td>
      </tr>`;
  }).join('');
}

function statusBadge(status) {
  const map = {
    active:   '<span class="badge badge-active">利用中</span>',
    trial:    '<span class="badge badge-trial">お試し</span>',
    canceled: '<span class="badge badge-canceled">解約済み</span>',
    pending:  '<span class="badge badge-trial">処理中</span>',
  };
  return map[status] || `<span class="badge">${status||'—'}</span>`;
}

function roleBadge(role) {
  if (role === 'admin') {
    return '<span style="display:inline-flex;align-items:center;gap:4px;background:#fef3c7;color:#b45309;border:1px solid #fcd34d;border-radius:6px;padding:3px 9px;font-size:12px;font-weight:700">👑 管理者</span>';
  }
  return '<span style="display:inline-flex;align-items:center;gap:4px;background:#f1f5f9;color:#475569;border:1px solid #cbd5e1;border-radius:6px;padding:3px 9px;font-size:12px;font-weight:700">👤 一般ユーザー</span>';
}

// ── アカウント作成 ──────────────────────────────
function openCreateModal() {
  document.getElementById('createModal').classList.add('open');
}

async function createAccount() {
  const name     = document.getElementById('c-name').value.trim();
  const email    = document.getElementById('c-email').value.trim();
  const phone    = document.getElementById('c-phone').value.trim();
  const birthday = document.getElementById('c-birthday').value;
  const password = document.getElementById('c-password').value;
  const role     = document.getElementById('c-role').value;
  const sessions = parseInt(document.getElementById('c-sessions').value) || 1;

  if (!name || !email || !password) {
    showMsg('createMsg', '名前・メール・パスワードは必須です', 'error'); return;
  }
  if (password.length < 8) {
    showMsg('createMsg', 'パスワードは8文字以上で入力してください', 'error'); return;
  }

  const btn = document.getElementById('createBtn');
  btn.classList.add('loading'); btn.disabled = true;

  try {
    // Cloud Function 経由でアカウント作成
    const fn = firebase.functions();
    const create = fn.httpsCallable('adminCreateAccount');
    await create({ name, email, phone, birthday, password, role, maxConcurrentSessions: sessions });
    closeModal('createModal');
    showToast('✅ アカウントを作成しました');
    // フォームリセット
    ['c-name','c-birthday','c-email','c-phone','c-password'].forEach(id =>
      document.getElementById(id).value = ''
    );
    document.getElementById('c-sessions').value = '1';
  } catch (e) {
    showMsg('createMsg', `エラー: ${e.message}`, 'error');
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

// ── アカウント編集 ──────────────────────────────
function openEditModal(uid) {
  const u = allUsers.find(x => x.id === uid);
  if (!u) return;
  editingUid = uid;
  document.getElementById('e-uid').value      = uid;
  document.getElementById('e-name').value     = u.name    || '';
  document.getElementById('e-email').value    = u.email   || '';
  document.getElementById('e-phone').value    = u.phone   || '';
  document.getElementById('e-status').value  = u.subscriptionStatus || 'active';
  document.getElementById('e-sessions').value = u.maxConcurrentSessions || 1;
  document.getElementById('e-role').value     = u.role   || 'user';
  document.getElementById('editMsg').className = 'msg-box';
  document.getElementById('editModal').classList.add('open');
}

async function saveEdit() {
  const btn = document.getElementById('editSaveBtn');
  btn.classList.add('loading'); btn.disabled = true;

  try {
    await db.collection('users').doc(editingUid).update({
      name:                  document.getElementById('e-name').value.trim(),
      email:                 document.getElementById('e-email').value.trim(),
      phone:                 document.getElementById('e-phone').value.trim(),
      subscriptionStatus:    document.getElementById('e-status').value,
      maxConcurrentSessions: parseInt(document.getElementById('e-sessions').value) || 1,
      role:                  document.getElementById('e-role').value,
      updatedAt:             firebase.firestore.FieldValue.serverTimestamp(),
    });
    closeModal('editModal');
    showToast('✅ 更新しました');
  } catch (e) {
    showMsg('editMsg', `エラー: ${e.message}`, 'error');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

// ── 共通 ────────────────────────────────────────

// ── 顧客詳細モーダル ─────────────────────────────
let detailUid = null;

async function openDetailModal(uid) {
  detailUid = uid;
  const u = allUsers.find(x => x.id === uid);
  if (!u) return;

  document.getElementById('detailModalTitle').textContent = `👤 ${u.name || u.email}`;
  document.getElementById('editMsg2').className = 'msg-box';

  // 基本情報表示
  const rows = [
    ['UID',        u.id],
    ['名前',       u.name || '—'],
    ['メール',     u.email || '—'],
    ['電話番号',   u.phone || '—'],
    ['生年月日',   u.birthday || '—'],
    ['ロール',     u.role === 'admin' ? '👑 管理者' : '一般ユーザー'],
    ['ステータス', { active:'✅ 利用中', canceled:'❌ 解約済み', pending:'⏳ 処理中' }[u.subscriptionStatus] || u.subscriptionStatus],
    ['同時接続上限', `${u.maxConcurrentSessions || 1}台`],
    ['登録日',     u.createdAt?.toDate ? u.createdAt.toDate().toLocaleDateString('ja-JP') : '—'],
    ['作成者',     u.createdBy ? '管理者が作成' : '本人登録'],
  ];
  document.getElementById('detailBasicInfo').innerHTML = rows.map(([l,v]) => `
    <div style="display:flex;gap:12px">
      <span style="color:var(--muted);font-weight:700;width:100px;flex-shrink:0">${l}</span>
      <span style="font-weight:${l==='UID'?'400':'700'};font-size:${l==='UID'?'11px':'14px'};word-break:break-all">${v}</span>
    </div>`).join('');

  // 管理者作成のアカウントのみ編集セクションを表示
  const editSection = document.getElementById('detailEditSection');
  if (u.createdBy) {
    editSection.style.display = '';
    document.getElementById('d-name').value     = u.name || '';
    document.getElementById('d-phone').value    = u.phone || '';
    document.getElementById('d-status').value   = u.subscriptionStatus || 'active';
    document.getElementById('d-sessions').value = u.maxConcurrentSessions || 1;
  } else {
    editSection.style.display = 'none';
  }

  // テスト進捗を読み込み
  document.getElementById('detailProgress').innerHTML = '読み込み中...';
  document.getElementById('detailModal').classList.add('open');

  try {
    const progSnap = await db.collection('users').doc(uid).collection('progress').get();
    const passed = progSnap.docs
      .map(d => ({id: d.id, ...d.data()}))
      .filter(d => d.passed)
      .sort((a,b) => {
        const ta = a.passedAt?.toDate?.() || new Date(0);
        const tb = b.passedAt?.toDate?.() || new Date(0);
        return ta - tb;
      });

    const UNIT_N = {
      'addition-10':'10までのたし算','subtraction-10':'10までのひき算',
      'addition-20':'20までのたし算','subtraction-20':'20までのひき算',
      'addition-horizontal':'足し算横式','subtraction-horizontal':'引き算横式',
      'addition-hissan':'たし算筆算','subtraction-hissan':'ひき算筆算',
      'multiplication-hissan':'かけ算筆算','division-hissan':'わり算筆算',
    };

    document.getElementById('detailProgress').innerHTML = passed.length === 0
      ? '<span style="color:var(--muted)">まだ合格した問題はありません</span>'
      : passed.map(p => {
          const date = p.passedAt?.toDate
            ? p.passedAt.toDate().toLocaleDateString('ja-JP') : '—';
          return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">
            <span>✅ ${UNIT_N[p.id]||p.id}</span>
            <span style="color:var(--muted)">${date} ${p.passedAge||''}</span>
          </div>`;
        }).join('');
  } catch(e) {
    document.getElementById('detailProgress').innerHTML = `<span style="color:var(--red)">エラー: ${e.message}</span>`;
  }
}

async function saveDetailEdit() {
  const btn = document.getElementById('detailSaveBtn');
  btn.classList.add('loading'); btn.disabled = true;
  try {
    await db.collection('users').doc(detailUid).update({
      name:                  document.getElementById('d-name').value.trim(),
      phone:                 document.getElementById('d-phone').value.trim(),
      subscriptionStatus:    document.getElementById('d-status').value,
      maxConcurrentSessions: parseInt(document.getElementById('d-sessions').value) || 1,
      updatedAt:             firebase.firestore.FieldValue.serverTimestamp(),
    });
    const msgEl = document.getElementById('editMsg2');
    msgEl.textContent = '✅ 保存しました'; msgEl.className = 'msg-box show success';
  } catch(e) {
    const msgEl = document.getElementById('editMsg2');
    msgEl.textContent = 'エラー: ' + e.message; msgEl.className = 'msg-box show error';
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function checkUnreadMessages() {
  db.collection('tickets').where('unreadAdmin', '==', true)
    .onSnapshot(snap => {
      const badge = document.getElementById('msgBadge');
      badge.textContent  = snap.size;
      badge.style.display = snap.size > 0 ? '' : 'none';
    });
}

function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `msg-box show ${type}`;
}
</script>
