<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>すうじをよもう | うちトレ</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* ===== すうじをよもう 専用スタイル ===== */
    .suuji-yomu-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 10mm 12mm 8mm;
      box-sizing: border-box;
    }
    .suuji-page-title {
      font-size: 20px;
      font-weight: 800;
      color: #1e293b;
      text-align: center;
      padding-bottom: 6px;
      border-bottom: 3px solid #f97316;
      margin-bottom: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }
    .suuji-page-no {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
    }
    .suuji-yonde {
      font-size: 15px;
      color: #f97316;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }
    .suuji-yomu-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 0;
    }
    .suuji-yomu-item {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      margin: 4px;
      background: #fffbf5;
    }
    .suuji-big {
      font-weight: 900;
      color: #1e293b;
      font-family: 'Arial Black', sans-serif;
      line-height: 1;
    }
  </style>
</head>
<body data-page-type="suuji-yomu" data-suuji-mode="yomu">
  <div class="container">
    <!-- ロゴ：中央配置 -->
    <div class="page-logo-area no-print">
      <img src="logo.svg" alt="うちトレ">
      <div>
        <div class="logo-text">うちトレ</div>
        <div class="logo-sub">Uchitore</div>
      </div>
    </div>

    <div class="header-row no-print">
      <div>
        <div style="display:none;"></div>
        <h1>すうじをよもう</h1>
        <div class="small-note">数字を声に出して読む練習です。</div>
      </div>
      <div class="header-actions">
        <a href="top-home.html" class="secondary-button">トップへ戻る</a>
      </div>
    </div>

    <div class="card controls no-print">
      <div class="control-group">
        <label for="range">はんい</label>
        <select id="range">
          <option value="1-10" selected>１〜10</option>
          <option value="11-20">11〜20</option>
          <option value="21-100">21〜100</option>
        </select>
      </div>
      <div class="control-group">
        <label for="count">枚数</label>
        <select id="count">
          <option value="1">1</option>
          <option value="3">3</option>
          <option value="5" selected>5</option>
          <option value="10">10</option>
        </select>
      </div>
      <div class="page-actions">
        <button class="primary" onclick="generate()">生成</button>
        <button class="secondary" onclick="window.print()">印刷</button>
        <button class="secondary" onclick="downloadPDF()">PDF保存</button>
      </div>
    </div>

    <div id="pages"></div>
  </div>
  <script src="assets/suuji-generator.js"></script>
</body>
</html>
