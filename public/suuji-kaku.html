<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>すうじをかこう | うちトレ</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* ===== すうじをかこう 専用スタイル ===== */
    .suuji-kaku-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8mm 12mm 8mm;
      box-sizing: border-box;
    }
    .suuji-page-title {
      font-size: 20px;
      font-weight: 800;
      color: #1e293b;
      text-align: center;
      padding-bottom: 6px;
      border-bottom: 3px solid #818cf8;
      margin-bottom: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }
    .suuji-page-no {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
    }
    .suuji-kaku-rows {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* 1行 = ガイドマス + 練習マス3個 */
    .kaku-row {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

    /* 共通マス */
    .kaku-box {
      position: relative;
      border: 2px solid #94a3b8;
      border-radius: 6px;
      background: #fff;
      overflow: hidden;
      aspect-ratio: 1 / 1.1;
    }

    /* 4線（書き方罫線） */
    .kaku-line {
      position: absolute;
      left: 0; right: 0;
      height: 1px;
    }
    .kaku-line-top  { top: 10%;   background: #bfdbfe; }
    .kaku-line-mid1 { top: 40%;   background: #e0e7ff; border-top: 1px dashed #c7d2fe; height: 0; }
    .kaku-line-mid2 { top: 65%;   background: #e0e7ff; border-top: 1px dashed #c7d2fe; height: 0; }
    .kaku-line-bot  { bottom: 10%; background: #bfdbfe; }

    /* 縦の中心線（点線） */
    .kaku-vline {
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      border-left: 1px dashed #e0e7ff;
    }

    /* ガイドマス（薄い数字が入る） */
    .kaku-guide-cell { }
    .kaku-guide-box {
      border: 2px solid #818cf8;
      background: #f5f3ff;
    }
    .kaku-guide-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: #c4b5fd;           /* 薄い紫：なぞり用ガイド */
      font-family: 'Arial Black', 'Noto Sans JP', sans-serif;
      line-height: 1;
      user-select: none;
    }

    /* ガイドマスの左上に「なぞろう」ラベル */
    .kaku-guide-box::before {
      content: 'なぞろう';
      position: absolute;
      top: 3px; left: 4px;
      font-size: 9px;
      color: #818cf8;
      font-weight: 700;
      z-index: 2;
    }
    /* 練習マスの左上に「かこう」ラベル */
    .kaku-box:not(.kaku-guide-box)::before {
      content: 'かこう';
      position: absolute;
      top: 3px; left: 4px;
      font-size: 9px;
      color: #94a3b8;
      font-weight: 700;
      z-index: 2;
    }
  </style>
</head>
<body data-page-type="suuji-kaku" data-suuji-mode="kaku">
  <div class="container">
    <!-- ロゴ：中央配置 -->
    <div class="page-logo-area no-print">
      <img src="logo.svg" alt="うちトレ">
      <div>
        <div class="logo-text">うちトレ</div>
        <div class="logo-sub">Uchitore</div>
      </div>
    </div>

    <div class="header-row no-print">
      <div>
        <div style="display:none;"></div>
        <h1>すうじをかこう</h1>
        <div class="small-note">薄いガイドをなぞって、数字の書き方を練習しよう。</div>
      </div>
      <div class="header-actions">
        <a href="top-home.html" class="secondary-button">トップへ戻る</a>
      </div>
    </div>

    <div class="card controls no-print">
      <div class="control-group">
        <label for="range">はんい</label>
        <select id="range">
          <option value="1-10" selected>１〜10</option>
          <option value="11-20">11〜20</option>
          <option value="21-100">21〜100</option>
        </select>
      </div>
      <div class="control-group">
        <label for="count">枚数</label>
        <select id="count">
          <option value="1">1</option>
          <option value="3">3</option>
          <option value="5" selected>5</option>
          <option value="10">10</option>
        </select>
      </div>
      <div class="page-actions">
        <button class="primary" onclick="generate()">生成</button>
        <button class="secondary" onclick="window.print()">印刷</button>
        <button class="secondary" onclick="downloadPDF()">PDF保存</button>
      </div>
    </div>

    <div id="pages"></div>
  </div>
  <script src="assets/suuji-generator.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.2.0/dist/signature_pad.umd.min.js"></script>
  <script src="assets/tablet-v2.js?v=28"></script>
</body>
</html>
