<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>約分・通分 | うちトレ</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* ===== 約分・通分 専用スタイル ===== */

    /* ページタイトル（印刷時に各ページに表示） */
    .yt-page-title {
      font-size: 15px;
      font-weight: 700;
      color: #334155;
      text-align: center;
      padding: 6px 0 4px;
      border-bottom: 2px solid #334155;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }

    /* ===== 約分グリッド（2列×10行） ===== */
    .yakubun-grid {
      grid-template-rows: repeat(10, 1fr) !important;
    }

    /* ===== 通分グリッド（2列×8行） ===== */
    .problem-tsubun-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(8, 1fr);
      height: calc(297mm - 10mm - 28mm);
    }
    .problem-tsubun-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 6px;
      border-bottom: 1px solid #e5e7eb;
      min-height: 0;
      overflow: hidden;
    }
    .tsubun-expr {
      gap: 4px !important;
      font-size: 14px;
    }
    .tsubun-to {
      font-size: 13px;
      color: #475569;
      flex-shrink: 0;
    }
    .tsubun-arrow {
      font-size: 16px;
      color: #475569;
      flex-shrink: 0;
      margin: 0 2px;
    }

    /* ===== 空白分数（解答欄） ===== */
    .frac-blank .frac-num,
    .frac-blank .frac-den {
      min-width: 24px;
      color: transparent; /* 文字を見えなくして罫線だけ表示 */
      border-bottom-color: #000;
    }
    .frac-blank .frac-den {
      border-bottom: none;
      border-top: none;
      /* 下の罫線 */
      text-decoration: none;
    }
    /* 分母・分子どちらも下線で書けるように */
    .frac-blank .frac-num {
      border-bottom: 2px solid #000;
      min-width: 28px;
    }
    .frac-blank .frac-den {
      min-width: 28px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ロゴ：中央配置 -->
    <div class="page-logo-area no-print">
      <img src="logo.svg" alt="うちトレ">
      <div>
        <div class="logo-text">うちトレ</div>
        <div class="logo-sub">Uchitore</div>
      </div>
    </div>

    <div class="header-row no-print">
      <div>
        <div style="display:none;"></div>
        <h1>約分・通分</h1>
      </div>
      <div class="header-actions">
        <a href="top-home.html" class="secondary-button">トップへ戻る</a>
      </div>
    </div>

    <div class="card controls no-print">
      <div class="control-group">
        <label for="mode">種類</label>
        <select id="mode">
          <option value="yakubun">約分（分数を簡単にする）</option>
          <option value="tsubun">通分（分母をそろえる）</option>
        </select>
      </div>

      <div class="control-group">
        <label for="max-den">分母の大きさ</label>
        <select id="max-den">
          <option value="12" selected>〜12</option>
          <option value="20">〜20</option>
          <option value="30">〜30</option>
        </select>
      </div>

      <div class="control-group">
        <label for="count">枚数</label>
        <select id="count">
          <option value="1">1</option>
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="20">20</option>
        </select>
      </div>

      <div class="page-actions">
        <button class="primary" onclick="generate()">生成</button>
        <button class="secondary" onclick="window.print()">印刷</button>
        <button class="secondary" onclick="downloadPDF()">PDF保存</button>
      </div>
    </div>

    <!-- ヒント表示 -->
    <div id="hint-box" class="card no-print" style="background:#f0fdf4; border:1px solid #86efac; padding:12px 16px; margin-bottom:12px; font-size:13px; color:#166534;">
      <strong>💡 約分とは？</strong>　分子と分母を同じ数で割って、できるだけ小さい数にすること。<br>
      例：<strong>6/8 → ÷2 → 3/4</strong>
    </div>

    <div id="pages"></div>
  </div>
  <script src="assets/yakubun-generator.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.2.0/dist/signature_pad.umd.min.js"></script>
  <script src="assets/tablet-v2.js?v=28"></script>
  <script>
    // ヒントボックスの切り替え
    document.getElementById('mode').addEventListener('change', function(){
      const hintBox = document.getElementById('hint-box');
      if(this.value === 'yakubun'){
        hintBox.innerHTML = '<strong>💡 約分とは？</strong>　分子と分母を同じ数で割って、できるだけ小さい数にすること。<br>例：<strong>6/8 → ÷2 → 3/4</strong>';
      } else {
        hintBox.innerHTML = '<strong>💡 通分とは？</strong>　2つの分数の分母を同じ数（最小公倍数）にそろえること。<br>例：<strong>1/2 と 1/3 → 3/6 と 2/6</strong>';
      }
    });
  </script>
<!-- ログインガード -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/assets/firebase-config.js"></script>
<script src="/assets/auth.js"></script>
<script>requireAuth();</script>
</body>
</html>
